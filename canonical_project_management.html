<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Canonical Spec — Project Management</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1f2b;
    --muted: #6b7380;
    --accent: #2563eb;
    --required: #16a34a;
    --preferred: #2563eb;
    --advanced: #9333ea;
    --both: #16a34a;
    --proxy: #2563eb;
    --imda: #ea8b00;
    --tier-essential: #16a34a;
    --tier-standard: #2563eb;
    --tier-optional: #6b7380;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .layout { display: grid; grid-template-columns: 320px 1fr; flex: 1; min-height: 0; }
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .top-nav {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: #fafbfd;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-nav h1 {
    margin: 0 0 2px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .top-nav .module-name {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
  }
  .top-nav .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 12px;
  }
  .top-nav .nav-btn {
    padding: 9px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    transition: all 0.1s;
  }
  .top-nav .nav-btn:hover { background: #eef2ff; }
  .top-nav .nav-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }

  .family-section { padding: 4px 0; }
  .family-heading {
    padding: 12px 16px 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    color: var(--muted);
  }
  .capability-list { list-style: none; padding: 0; margin: 0; }
  .capability-list li {
    padding: 9px 16px 9px 20px;
    border-left: 3px solid transparent;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    transition: background 0.1s;
  }
  .capability-list li:hover { background: #f1f4f9; }
  .capability-list li.active {
    background: #eef2ff;
    border-left-color: var(--accent);
  }
  .capability-list .cap-name { flex: 1; font-size: 13px; font-weight: 500; }
  .capability-list li.active .cap-name { font-weight: 600; }
  .capability-list .cap-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .capability-list .count {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .sme-dot { display:inline-block;width:6px;height:6px;background:var(--required);border-radius:50%;margin-right:5px;margin-bottom:1px;vertical-align:middle; }
  .non-sme-dot { display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;margin-right:5px;margin-bottom:1px;vertical-align:middle;opacity:0.4; }

  main {
    overflow-y: auto;
    padding: 28px 36px 80px;
  }
  main.narrow > * { max-width: 960px; margin-left: auto; margin-right: auto; }

  .page-header { margin-bottom: 24px; }
  .page-header h2 { margin: 0 0 8px; font-size: 26px; font-weight: 700; }
  .page-header .page-subtitle { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* Overview: Methodology (collapsed by default) */
  .method-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 20px 0 28px;
    overflow: hidden;
  }
  .method-header {
    padding: 13px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: #fafbfd;
  }
  .method-header:hover { background: #eef2ff; }
  .method-block.expanded .method-header { border-bottom: 1px solid var(--border); }
  .method-title { font-weight: 600; font-size: 14px; }
  .method-hint { font-size: 11px; color: var(--muted); }
  .method-caret { font-size: 12px; color: var(--muted); }
  .method-body { padding: 16px 22px 18px; display: none; }
  .method-block.expanded .method-body { display: block; }
  .method-section {
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    margin-bottom: 10px;
    background: #fafbfd;
    border-radius: 0 6px 6px 0;
  }
  .method-section:last-child { margin-bottom: 0; }
  .method-section h4 { margin: 0 0 4px; font-size: 13px; color: var(--accent); font-weight: 600; }
  .method-section p { margin: 0; line-height: 1.6; font-size: 13px; color: var(--text); }
  .method-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  .method-footer code {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    background: #f3f4f6;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-style: normal;
  }

  /* Overview: Checklist section title */
  .checklist-header {
    margin: 28px 0 12px;
  }
  .checklist-header h3 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 700;
  }
  .checklist-header .checklist-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .global-filter-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 14px 0 20px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .global-filter-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .global-filter-bar .pill-group { display: flex; gap: 4px; }
  .global-filter-bar .pill {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    background: var(--bg);
    font-size: 12px;
    font-weight: 500;
  }
  .global-filter-bar .pill:hover { background: #eef2ff; }
  .global-filter-bar .pill.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  .expand-toggle {
    margin-left: auto;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }

  /* Three-level accordion */
  .family-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .family-acc-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #fafbfd;
    transition: background 0.1s;
    border-left: 4px solid var(--accent);
  }
  .family-acc-header:hover { background: #eef2ff; }
  .family-acc:not(.collapsed) .family-acc-header { border-bottom: 1px solid var(--border); }
  .family-acc-title { font-size: 16px; font-weight: 700; }
  .family-acc-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .family-tier-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-left: 8px;
  }
  .family-tier-badge.essential { background: #dcfce7; color: #166534; }
  .family-tier-badge.standard { background: #dbeafe; color: #1e40af; }
  .family-tier-badge.optional { background: #e5e7eb; color: #4b5563; }
  .family-acc-counts {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .family-acc-counts .count-chip {
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--bg);
  }
  .family-acc-counts .count-chip.req { background: #dcfce7; color: #166534; font-weight: 600; }
  .family-acc-counts .count-chip.pref { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .family-acc-caret { font-size: 13px; color: var(--muted); width: 14px; text-align: center; }
  .family-acc-body { padding: 16px 22px 20px; }
  .family-acc.collapsed .family-acc-body { display: none; }

  .family-narrative {
    background: #f0f9ff;
    border-left: 3px solid #0ea5e9;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.65;
    color: #0c4a6e;
    margin-bottom: 18px;
  }

  .cap-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .cap-acc-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    transition: background 0.1s;
  }
  .cap-acc-header:hover { background: #fafbfd; }
  .cap-acc:not(.collapsed) .cap-acc-header { border-bottom: 1px solid var(--border); background: #fafbfd; }
  .cap-acc-title { font-weight: 600; font-size: 14px; }
  .cap-acc-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .cap-acc-counts { display: flex; gap: 6px; font-size: 11px; flex-shrink: 0; }
  .cap-acc-body { padding: 12px 18px 14px; }
  .cap-acc.collapsed .cap-acc-body { display: none; }

  .cap-excluded-banner {
    background: #fefce8;
    border-left: 3px solid #eab308;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    color: #713f12;
    margin: 0;
    font-style: italic;
  }

  /* Individual SME item accordion */
  .item-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .item-acc-header {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
  }
  .item-acc-header:hover { background: #fafbfd; }
  .item-acc:not(.collapsed) .item-acc-header { border-bottom: 1px solid var(--border); background: #fafbfd; }
  .item-tier-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .item-tier-badge.required { background: #dcfce7; color: #166534; }
  .item-tier-badge.preferred { background: #dbeafe; color: #1e40af; }
  .item-text { flex: 1; line-height: 1.55; font-size: 13px; }
  .item-rationale {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
    line-height: 1.5;
  }
  .item-caret {
    font-size: 11px;
    color: var(--muted);
    width: 12px;
    text-align: center;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .item-acc-body { padding: 10px 14px 12px 38px; }
  .item-acc.collapsed .item-acc-body { display: none; }
  .item-sources-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 5px;
  }
  .source-ref {
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .source-ref:last-child { border-bottom: none; }
  .src-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-right: 6px;
  }
  .src-pill.required { background: #dcfce7; color: #166534; }
  .src-pill.preferred { background: #dbeafe; color: #1e40af; }
  .src-pill.proxy { background: #dbeafe; color: #1e40af; }
  .src-pill.imda { background: #ffedd5; color: #9a3412; }
  .src-pill.both { background: #dcfce7; color: #166534; }

  /* ========== Vendor Questionnaire ========== */
  .questionnaire-section {
    margin-top: 28px;
  }
  .q-section-header {
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .q-section-header h3 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
  }
  .q-section-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .q-family {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .q-family-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    background: #fafbfd;
    border-left: 4px solid var(--accent);
    transition: background 0.1s;
  }
  .q-family-header:hover { background: #eef2ff; }
  .q-family:not(.collapsed) .q-family-header { border-bottom: 1px solid var(--border); }
  .q-family-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .q-family-narrative {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    margin-top: 4px;
  }
  .q-family-count {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    padding: 3px 10px;
    background: var(--bg);
    border-radius: 10px;
    align-self: flex-start;
    margin-top: 3px;
  }
  .q-family-caret {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
    align-self: center;
    width: 14px;
    text-align: center;
  }
  .q-family-body {
    padding: 14px 18px 18px;
  }
  .q-family.collapsed .q-family-body { display: none; }

  .q-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--required);
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .q-card.preferred { border-left-color: var(--preferred); }
  .q-card-header {
    padding: 14px 18px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .q-card-header:hover { background: #fafbfd; }
  .q-card-cap {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .q-card-question {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .q-card-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .q-card-answer-format {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .q-card-toggle {
    font-size: 11px;
    color: var(--accent);
    margin-left: auto;
    font-weight: 500;
  }
  .q-card.expanded .q-card-toggle::after { content: " ▼"; }
  .q-card:not(.expanded) .q-card-toggle::after { content: ""; }
  .q-card-body {
    display: none;
    padding: 14px 18px 18px;
    border-top: 1px dashed var(--border);
    background: #fafbfd;
  }
  .q-card.expanded .q-card-body { display: block; }
  .q-prompt {
    background: #f0f9ff;
    border-left: 3px solid #0ea5e9;
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .q-prompt-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    color: #0c4a6e;
    margin-bottom: 4px;
  }
  .q-prompt-hint {
    font-size: 12px;
    color: #0c4a6e;
    line-height: 1.55;
    font-style: italic;
  }
  .q-covers-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .q-cover-item {
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .q-cover-item:last-child { border-bottom: none; }
  .q-cover-rationale {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 3px;
    line-height: 1.5;
  }
  .src-pill.both { background: #dcfce7; color: #166534; }

  /* ========== Overview mode toggle ========== */
  .overview-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 20px 0 0;
    flex-wrap: wrap;
  }
  .overview-expand-btn {
    padding: 7px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    font-family: inherit;
  }
  .overview-expand-btn:hover {
    background: #eef2ff;
    border-color: var(--accent);
  }
  .overview-mode-tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: #eceff4;
    border-radius: 8px;
    width: fit-content;
  }
  .overview-mode-tab {
    padding: 7px 16px;
    cursor: pointer;
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.1s;
  }
  .overview-mode-tab:hover { color: var(--text); }
  .overview-mode-tab.active {
    background: var(--panel);
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .answer-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 10px;
  }

  /* ========== Compact view ========== */
  .compact-section {
    margin-top: 24px;
  }
  .compact-section-title {
    font-size: 15px;
    font-weight: 700;
    margin: 0 0 4px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }
  .compact-section-title.required { color: var(--required); border-bottom-color: var(--required); }
  .compact-section-title.preferred { color: var(--preferred); border-bottom-color: var(--preferred); }
  .compact-section-sub {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
    font-style: italic;
  }
  .compact-family-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
    margin: 14px 0 6px;
    padding-left: 4px;
  }
  .compact-q {
    margin-bottom: 4px;
    border-left: 3px solid var(--border);
    background: var(--panel);
    border-radius: 0 4px 4px 0;
    transition: background 0.1s;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid var(--border);
    border-left-width: 3px;
    overflow: hidden;
  }
  .compact-q.required { border-left-color: var(--required); }
  .compact-q.preferred { border-left-color: var(--preferred); }
  .compact-q-head {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
  }
  .compact-q-head:hover { background: #fafbfd; }
  .compact-q-head-main { flex: 1; min-width: 0; }
  .compact-q-cap {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .compact-q-text {
    color: var(--text);
  }
  .compact-q-caret {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.15s;
    padding-top: 2px;
  }

d"}, {"from": "P4", "to": "P5", "style": "solid"}, {"from": "P5", "to": "P6", "style": "solid"}], "colours": {"phase": {"fill": "#dbeafe", "stroke": "#2563eb"}, "cap": {"fill": "#ffffff", "stroke": "#6b7380"}}}, "edge_legend": [{"style": "solid", "meaning": "Time flows left to right through the six stages of a project engagement"}], "box_legend": [{"colour": "phase", "label": "Stage of the project delivery lifecycle"}, {"colour": "cap", "label": "Capability that delivers value in that stage"}]}}, "methodology_short": [{"heading": "Where the requirements come from", "body": "We combined two sources: the Productivity Solutions Grant (PSG) Pre-Approval Guide (Singapore's regulator-backed list of SME digital solution requirements, published on GitBook) and proxy research from mainstream project management systems. Every requirement in this viewer points back to at least one of these sources."}, {"heading": "How we used the PSG gitbook", "body": "We scraped all 89 PSG solution categories across 14 verticals, parsed each page preserving the original section headings, deduplicated across categories, and stripped generic compliance boilerplate (Cyber Essentials Mark, PDPA, security audit language). Each requirement was tagged with the ERP modules it belongs to \u2014 Project Management sol cats are thin in PSG, so the proxy research plays a larger role for this module."}, {"heading": "How we used internet research as proxy", "body": "We drafted a reference catalogue of 29 capabilities a mature Project Management module should cover, sourced from public documentation of Odoo Project, Odoo Timesheets, ERPNext Projects, and Wikipedia, plus training knowledge from Microsoft Project, Jira, SAP PS, Oracle Primavera, and NetSuite SRP. Each capability was hand-tagged with a priority (Required / Preferred / Enterprise-only) and an audience (SME / Mid-market / Enterprise)."}, {"heading": "How we combined the two", "body": "A five-step automated pipeline merges the PSG requirements in r or managing tight project margins, accurate time and expense capture directly affects invoicing accuracy and profitability. A design agency tracking billable hours per client, or a maintenance contractor logging travel expenses, both need this to stay profitable.", "sme_tier": "essential"}, "Financial Control": {"narrative": "This family links project spending to budgets and turns project data into client invoices, so you know if a project is making or losing money before it ends. Singapore SMEs operating on fixed-price or time-and-materials contracts depend on this to avoid cost overruns and ensure timely, accurate billing. A software development firm invoicing on milestones, or a consulting firm billing by the hour with expense reimbursement, both need visibility into project profitability.", "sme_tier": "essential"}, "Delivery & Tracking": {"narrative": "This family gives you a visual timeline of your project, alerts you to risks and delays, and lets customers see progress and approve work without constant emails. For a Singapore SME managing client expectations and delivering on time, a Gantt chart and risk register help you spot problems early, while a customer portal reduces back-and-forth and builds confidence. A renovation contractor showing clients progress photos and timelines, or a software vendor getting sign-off on milestones, both benefit from this transparency.", "sme_tier": "essential"}, "Analytics & Reporting": {"narrative": "This family turns project data into dashboards and reports so you and your leadership can see at a glance which projects are on track, which are at risk, and how the team is performing. For a Singapore SME with multiple projects or ambitions to grow, regular visibility into project health and team utilisation helps you make faster, smarter decisions about resource allocation and pricing. A project manager reviewing weekly status for the board, or a director spotting which project types are most profitable, both rely on this." function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function shortSolcat(sc) { const parts = sc.split("__"); return parts[parts.length - 1]; }

function renderTopNav() {
  document.getElementById("moduleName").textContent = DATA.module_name;
  document.querySelectorAll(".nav-btn").forEach((btn) => {
    btn.classList.toggle("active", btn.dataset.view === state.topView);
    btn.onclick = () => {
      state.topView = btn.dataset.view;
      state.specialView = null;
      renderAll();
    };
  });
}

      <div class="family-section">
        <div class="family-heading">Compliance groups</div>
        <ul class="capability-list">
          ${baseline.groups.map((g) => `
            <li>
              <div style="flex:1;"><div class="cap-name">${escapeHtml(g.short)}</div><div class="cap-meta">${g.checklist.length} items</div></div>
            </li>
          `).join("")}
        </ul>
      </div>
      <div class="family-section">
        <div class="family-heading">Summary</div>
        <ul class="capability-list">
          <li><div style="flex:1;"><div class="cap-name">${baseline.stats.total_checklist_items} items</div><div class="cap-meta">rolled up from ${baseline.stats.raw_items} PSG requirements</div></div></li>
        </ul>
      </div>
    `;
    return;
  }

  // Review sidebar
  const byFamily = {};
  DATA.capabilities.forEach((c) => { (byFamily[c.family] = byFamily[c.family] || []).push(c); });
  const order = DATA.family_order.length > 0 ? DATA.family_order : Object.keys(byFamily);
  let html = "";
  order.forEach((fam) => {
    const caps = byFamily[fam];
    if (!caps || caps.length === 0) return;
    html += `<div class="family-section"><div class="family-heading">${escapeHtml(fam)}</div><ul class="capability-list">`;
    caps.forEach((c) => {
      const active = c.id === state.capId && !state.specialView ? " active" : "";
      const dot = c.sme_applicable ? '<span class="sme-dot" title="For SMEs"></span>' : '<span class="non-sme-dot" title="Not for SMEs"></span>';
      html += `<li class="${active.trim()}" data-id="${escapeHtml(c.id)}">
        <div style="flex:1;">
          <div class="cap-name">${dot}${escapeHtml(c.name)}</div>
          <div class="cap-meta">${escapeHtml(c.priority_proxy_label)} · ${escapeHtml(c.applicability_display)}</div>
        </div>
        <div class="count">${c.unified.length}</div>
      </li>`;
    });
    html += `</ul></div>`;
  });

  if (DATA.unmapped_imda.length > 0 || DATA.dropped_noise.length > 0) {
    html += `<div class="family-section"><div class="family-heading">Review buckets</div><ul class="capability-list">`;
    if (DATA.unmapped_imda.length > 0) {
      const a = state.specialView === "unmapped" ? " active" : "";
      html += `<li class="${a.trim()}" data-special="unmapped"><div style="flex:1;"><div class="cap-name">Unmatched PSG items</div><div class="cap-meta">not placed by Step 1</div></div><div class="count">${DATA.unmapped_imda.length}</div></li>`;
    }
    if (DATA.dropped_noise.length > 0) {
      const a = state.specialView === "noise" ? " active" : "";
      html += `<li class="${a.trim()}" data-special="noise"><div style="flex:1;"><div class="cap-name">Dropped as noise</div><div class="cap-meta">form-residue filter</div></div><div class="count">${DATA.dropped_noise.length}</div></li>`;
    }
    html += `</ul></div>`;
  }

  body.innerHTML = html;
  body.querySelectorAll("li[data-id]").forEach((li) => {
    li.onclick = () => { state.capId = li.dataset.id; state.specialView = null; renderAll(); };
  });
  body.querySelectorAll("li[data-special]").forEach((li) => {
    li.onclick = () => { state.specialView = li.dataset.special; state.capId = null; renderAll(); };
  });
}

function totalGranular() { return DATA.capabilities.reduce((a, c) => a + c.unified.length, 0); }
function totalFeatures() { return DATA.capabilities.reduce((a, c) => a + (c.features || []).length, 0); }
function totalSme() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.length : 0), 0); }
function totalRequired() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.filter(i => i.tier === "required").length : 0), 0); }
function totalPreferred() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.filter(i => i.tier === "preferred").length : 0), 0); }
function getCap() { return DATA.capabilities.find((c) => c.id === state.capId); }

// =============================================================================
// OVERVIEW view — Vendor Questionnaire (the baseline deliverable)
// =============================================================================
//
// Structure:
//   - Page header with short description
//   - Collapsed "How this specification was built" block
//   - Required Capabilities section (one yes/no question per capability that
//     has required items, grouped by family visually)
//   - Preferred Capabilities section (same structure, capabilities that have
//     preferred items)
//
// A capability can appear in BOTH sections if it has items at both tiers.
// Each question is expandable to show the detailed items it was derived from
// (the audit trail). Questions have an optional "supporting detail" hint
// shown in fine print when expanded.

function renderOverview() {
  const main = document.getElementById("main");
  main.classList.add("narrow");
  const body = document.getElementById("mainBody");

  const methodHtml = renderMethodologyBlock();
  const mode = state.overviewMode;  // compact_all | compact_required | compact_preferred | detailed

  let contentHtml = "";
  if (mode === "detailed") {
    const requiredListHtml = renderDetailedList("required");
    const preferredListHtml = renderDetailedList("preferred");
    contentHtml = `
      <div class="questionnaire-section">
        <div class="q-section-header">
          <h3>Required Capabilities</h3>
          <div class="q-section-hint">${DATA.total_required_qs} questions — module minimums that every vendor must cover across industries. Click a card to see its audit trail.</div>
          <div class="answer-note">Answer format: Yes or No, with a short description if yes.</div>
        </div>
        ${requiredListHtml}
      </div>

      <div class="questionnaire-section">
        <div class="q-section-header">
          <h3>Preferred Capabilities</h3>
          <div class="q-section-hint">${DATA.total_preferred_qs} questions — SME-important capabilities that depend on your business model or industry.</div>
          <div class="answer-note">Answer format: Yes or No, with a short description if yes.</div>
        </div>
        ${preferredListHtml}
      </div>
    `;
  } else {
    // Compact modes
    const showRequired = mode === "compact_all" || mode === "compact_required";
    const showPreferred = mode === "compact_all" || mode === "compact_preferred";
    const parts = [];
    if (showRequired) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title required">Required (${DATA.total_required_qs})</div>
          <div class="compact-section-sub">Module minimums that every vendor must cover across industries.</div>
          ${renderCompactList("required")}
        </div>
      `);
    }
    if (showPreferred) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title preferred">Preferred (${DATA.total_preferred_qs})</div>
          <div class="compact-section-sub">SME-important capabilities that depend on your business model or industry.</div>
          ${renderCompactList("preferred")}
        </div>
      `);
    }
    contentHtml = parts.join("");
  }

  const complianceBannerHtml = DATA.compliance_baseline ? `
    <div class="compliance-note" id="complianceBanner">
      Plus ${DATA.compliance_baseline.stats.total_checklist_items} cross-module compliance requirements (CEM, PDPA, VA/PT) every vendor must meet.
      <span class="compliance-note-link">View compliance →</span>
    </div>
  ` : "";

  body.innerHTML = `
    <div class="page-header">
      <h2>${escapeHtml(DATA.module_name)} — Vendor Self-Assessment Checklist</h2>
      <div class="page-subtitle">${escapeHtml(DATA.module_headline)}</div>
    </div>

    ${methodHtml}

    ${complianceBannerHtml}

    <div class="overview-toolbar">
      <div class="overview-mode-tabs">
        <div class="overview-mode-tab ${mode === 'compact_required' ? 'active' : ''}" data-mode="compact_required">Compact required</div>
        <div class="overview-mode-tab ${mode === 'compact_preferred' ? 'active' : ''}" data-mode="compact_preferred">Compact preferred</div>
        <div class="overview-mode-tab ${mode === 'compact_all' ? 'active' : ''}" data-mode="compact_all">Compact all</div>
        <div class="overview-mode-tab ${mode === 'detailed' ? 'active' : ''}" data-mode="detailed">Detailed</div>
      </div>
      ${mode !== 'detailed' ? `
        <button class="overview-expand-btn" id="expandCollapseBtn">Expand all</button>
      ` : ""}
    </div>

    ${contentHtml}
  `;

  // Methodology block toggle
  const mb = body.querySelector(".method-block");
  if (mb) {
    mb.classList.toggle("expanded", state.methodOpen);
    const header = mb.querySelector(".method-header");
    header.onclick = () => {
      state.methodOpen = !state.methodOpen;
      mb.classList.toggle("expanded", state.methodOpen);
      mb.querySelector(".method-caret").textContent = state.methodOpen ? "▼" : "▶";
    };
  }

  // Mode tab switching
  body.querySelectorAll(".overview-mode-tab").forEach((t) => {
    t.onclick = () => {
      state.overviewMode = t.dataset.mode;
      renderOverview();
    };
  });

  // Compliance banner click → jump to Compliance view
  const banner = body.querySelector("#complianceBanner");
  if (banner) {
    banner.onclick = () => {
      state.topView = "compliance";
      renderAll();
    };
  }

  // Detailed mode: family accordion + card expand
  body.querySelectorAll(".q-family-header").forEach((h) => {
    h.onclick = () => h.parentElement.classList.toggle("collapsed");
  });
  body.querySelectorAll(".q-card-header").forEach((h) => {
    h.onclick = (e) => { e.stopPropagation(); h.parentElement.classList.toggle("expanded"); };
  });

  // Compact mode: click a capability head to expand/collapse its body
  body.querySelectorAll(".compact-q-head").forEach((h) => {
    h.onclick = () => h.parentElement.classList.toggle("collapsed");
  });

  // Compact mode: click a bullet to show its rationale in fine print
  body.querySelectorAll(".psg-bullet").forEach((el) => {
    el.onclick = (e) => {
      e.stopPropagation();
      el.classList.toggle("expanded");
    };
  });

  // Expand all / Collapse all button
  const expandBtn = body.querySelector("#expandCollapseBtn");
  if (expandBtn) {
    expandBtn.onclick = () => {
      const cards = body.querySelectorAll(".compact-q");
      const anyCollapsed = Array.from(cards).some(c => c.classList.contains("collapsed"));
      cards.forEach(c => c.classList.toggle("collapsed", !anyCollapsed));
      expandBtn.textContent = anyCollapsed ? "Collapse all" : "Expand all";
    };
  }
}

function renderMethodologyBlock() {
  if (!DATA.methodology_short || DATA.methodology_short.length === 0) return "";
  const sections = DATA.methodology_short.map((s) => `
    <div class="method-section">
      <h4>${escapeHtml(s.heading)}</h4>
      <p>${escapeHtml(s.body)}</p>
    </div>
  `).join("");
  return `
    <div class="method-block">
      <div class="method-header">
        <div>
          <div class="method-title">How this checklist was built</div>
          <div class="method-hint">Plain-language summary of the sources, pipeline, and trust model. Click to expand.</div>
        </div>
        <div class="method-caret">▶</div>
      </div>
      <div class="method-body">
        ${sections}
        <div class="method-footer">Full technical write-up with pipeline stages, LLM prompts, cost accounting, and decision rationale: <code>docs/methodology.md</code></div>
      </div>
    </div>
  `;
}

function capsForTier(tier) {
  // Filter capabilities whose vendor_questions.tier matches, grouped by family
  const byFamily = {};
  DATA.capabilities.forEach((c) => {
    const vq = c.vendor_questions;
    if (!vq || !vq.question || vq.tier !== tier) return;
    (byFamily[c.family] = byFamily[c.family] || []).push(c);
  });
  return byFamily;
}

function renderDetailedList(tier) {
  const byFamily = capsForTier(tier);
  const order = DATA.family_order.length > 0 ? DATA.family_order : Object.keys(byFamily);

  const html = order.map((fam) => {
    const caps = byFamily[fam] || [];
    if (caps.length === 0) return "";
    const narr = DATA.family_narratives[fam];
    const famIdSafe = `${tier}-${fam.replace(/[^a-z0-9]/gi, "_")}`;

    const capsHtml = caps.map((c) => {
      const vq = c.vendor_questions;
      const coversHtml = vq.covers.map((item) => `
        <div class="q-cover-item">
          ${escapeHtml(item.text)}
          ${item.rationale ? `<div class="q-cover-rationale">${escapeHtml(item.rationale)}</div>` : ""}
        </div>
      `).join("");
      return `
        <div class="q-card ${tier}">
          <div class="q-card-header">
            <div class="q-card-cap">${escapeHtml(c.name)}</div>
            <div class="q-card-question">${escapeHtml(vq.question)}</div>
            <div class="q-card-controls">
              <div class="q-card-answer-format">Answer: Yes or No, with short description</div>
              <div class="q-card-toggle">Detail ▸</div>
            </div>
          </div>
          <div class="q-card-body">
            ${vq.free_text_prompt ? `
              <div class="q-prompt">
                <div class="q-prompt-label">If yes, briefly describe how your solution handles this:</div>
                <div class="q-prompt-hint">${escapeHtml(vq.free_text_prompt)}</div>
              </div>
            ` : ""}
            <div class="q-covers-label">This question rolls up ${vq.covers.length} detailed requirement${vq.covers.length === 1 ? "" : "s"}:</div>
            ${coversHtml}
          </div>
        </div>
      `;
    }).join("");

    if (!capsHtml) return "";

    return `
      <div class="q-family" id="fam-${famIdSafe}">
        <div class="q-family-header">
          <div style="flex:1;">
            <div class="q-family-title">${escapeHtml(fam)}</div>
            ${narr ? `<div class="q-family-narrative">${escapeHtml(narr.narrative)}</div>` : ""}
          </div>
          <div class="q-family-count">${caps.length}</div>
          <div class="q-family-caret">▶</div>
        </div>
        <div class="q-family-body">
          ${capsHtml}
        </div>
      </div>
    `;
  }).join("");

  return html || `<div class="empty">No ${tier} capabilities for this module.</div>`;
}

function renderCompactList(tier) {
  // Compact layout with capability-level accordions.
  //
  // - Family name is a visual label (not collapsible)
  // - Each capability is a collapsible card
  // - Default state: all capabilities collapsed, showing only the
  //   summary question. One scroll shows every question at a glance.
  // - Click a capability header to reveal its bullets + free-text prompt
  // - "Expand all / Collapse all" button in the toolbar toggles every
  //   card at once
  const byFamily = capsForTier(tier);
  const order = DATA.family_order.length > 0 ? DATA.family_order : Object.keys(byFamily);

  const html = order.map((fam) => {
    const caps = byFamily[fam] || [];
    if (caps.length === 0) return "";

    const qsHtml = caps.map((c) => {
      const vq = c.vendor_questions;
      const bullets = c.sme_minimum || [];
      const bulletsHtml = bullets.map((item) => `
        <li class="psg-bullet">
          <span class="psg-bullet-box">☐</span>
          <span class="psg-bullet-text">${escapeHtml(item.text)}</span>
          ${item.rationale ? `<div class="psg-bullet-rationale">${escapeHtml(item.rationale)}</div>` : ""}
        </li>
      `).join("");

      return `
        <div class="compact-q ${tier} collapsed">
          <div class="compact-q-head">
            <div class="compact-q-head-main">
              <div class="compact-q-cap">${escapeHtml(c.name)}</div>
              <div class="compact-q-text">${escapeHtml(vq.question)}</div>
            </div>
            <div class="compact-q-caret">▸</div>
          </div>
          <div class="compact-q-body">
            <ul class="psg-bullets">
              ${bulletsHtml}
            </ul>
            ${vq.free_text_prompt ? `
              <div class="psg-prompt">
                <span class="psg-prompt-label">If yes, describe:</span>
                ${escapeHtml(vq.free_text_prompt)}
              </div>
            ` : ""}
          </div>
        </div>
      `;
    }).join("");

    const ovFamId = "ov-fam-" + fam.replace(/[^a-z0-9]/gi, "_");
    return `
      <div class="compact-family" id="${ovFamId}">
        <div class="compact-family-header">${escapeHtml(fam)} (${caps.length})</div>
        ${qsHtml}
      </div>
    `;
  }).join("");

  return html || `<div class="empty">No ${tier} capabilities for this module.</div>`;
}

// =============================================================================
// REVIEW view
// =============================================================================

function renderReview() {
  document.getElementById("main").classList.remove("narrow");
  if (state.specialView) { renderSpecialView(); return; }
  if (!state.capId) {
    const first = DATA.capabilities.find(c => c.unified.length > 0 && c.sme_applicable) || DATA.capabilities.find(c => c.unified.length > 0);
    state.capId = first ? first.id : DATA.capabilities[0].id;
  }
  renderCap();
}

function renderSpecialView() {
  const body = document.getElementById("mainBody");
  if (state.specialView === "unmapped") {
    const items = DATA.unmapped_imda;
    body.innerHTML = `
      <div class="header"><div><h2>Unmatched PSG Items</h2><div class="slug">not placed by Step 1</div></div></div>
      <div class="description">These PSG gitbook items didn't match any capability in the catalogue. Legitimate "not really this module" items, or a missing capability we should add?</div>
      <div class="result-count">${items.length} items</div>
      ${items.map(r => `
        <div class="raw-imda-item">
          <div class="meta">${escapeHtml(r.q_title || '')} ${r.subsection ? '| ' + escapeHtml(r.subsection) : ''} · ${(r.sources || []).map(s => '<code>'+shortSolcat(s)+'</code>').join(' ')}</div>
          ${escapeHtml(r.text)}
        </div>
      `).join("")}
    `;
    return;
  }
  if (state.specialView === "noise") {
    const items = DATA.dropped_noise;
    body.innerHTML = `
      <div class="header"><div><h2>Dropped as Noise</h2><div class="slug">filtered by context-aware regex</div></div></div>
      <div class="description">Form prompts filtered out in the pre-step. The filter protects any text whose question title or subsection contains a domain keyword, so most would-be noise flows through to the Review view instead.</div>
      <div class="result-count">${items.length} items</div>
      ${items.length === 0 ? '<div class="empty">No items dropped. Everything flowed through for review.</div>' : items.map(r => `
        <div class="raw-imda-item">
          <div class="meta">${escapeHtml(r.q_title || '')} ${r.subsection ? '| ' + escapeHtml(r.subsection) : ''} · reason: <code>${escapeHtml(r.reason || 'unknown')}</code></div>
          ${escapeHtml(r.text)}
        </div>
      `).join("")}
    `;
  }
}

function renderCap() {
  const cap = getCap();
  if (!cap) return;
  const body = document.getElementById("mainBody");
  const meta = `
    <span><strong>${cap.stats.merged_out}</strong> detailed</span>
    <span><strong>${cap.features.length}</strong> features</span>
    <span><strong>${cap.sme_minimum ? cap.sme_minimum.length : 0}</strong> minimum items</span>
    <span>capability priority: <strong>${escapeHtml(cap.priority_proxy_label)}</strong></span>
    <span>audience: <strong>${escapeHtml(cap.applicability_display)}</strong></span>
  `;
  const smeBanner = cap.sme_applicable && cap.sme_minimum
    ? `<div class="sme-reason-banner">${escapeHtml(cap.sme_reason)}</div>`
    : `<div class="sme-reason-banner excluded">${escapeHtml(cap.sme_reason)}</div>`;

  body.innerHTML = `
    <div class="header">
      <div>
        <h2>${escapeHtml(cap.name)}</h2>
        <div class="slug">${escapeHtml(cap.id)} · ${escapeHtml(cap.family)}</div>
      </div>
    </div>
    <div class="description">${escapeHtml(cap.description)}</div>
    <div class="meta-row">${meta}</div>
    ${smeBanner}
    <div class="lens-tabs">
      <div class="lens-tab ${state.lens === 'granular' ? 'active' : ''}" data-lens="granular">All Requirements</div>
      <div class="lens-tab ${state.lens === 'features' ? 'active' : ''}" data-lens="features">Grouped by Feature</div>
      <div class="lens-tab ${state.lens === 'sme' ? 'active' : ''}" data-lens="sme">SME Minimum</div>
    </div>
    <div id="lensContent"></div>
  `;
  body.querySelectorAll(".lens-tab").forEach((t) => {
    t.onclick = () => {
      state.lens = t.dataset.lens;
      body.querySelectorAll(".lens-tab").forEach((other) => other.classList.toggle("active", other.dataset.lens === state.lens));
      renderLens();
    };
  });
  renderLens();
}

function renderLens() {
  const cap = getCap();
  const host = document.getElementById("lensContent");
  if (!host) return;
  if (state.lens === "granular") return renderGranularLens(host, cap);
  if (state.lens === "features") return renderFeaturesLens(host, cap);
  if (state.lens === "sme") return renderSmeLens(host, cap);
}

function renderGranularLens(host, cap) {
  host.innerHTML = `
    <div class="source-tabs">
      <div class="source-tab ${state.sourceTab === 'unified' ? 'active' : ''}" data-src="unified">Unified (${cap.unified.length})</div>
      <div class="source-tab ${state.sourceTab === 'proxy' ? 'active' : ''}" data-src="proxy">Mainstream ERP catalogue (${cap.proxy_raw.length})</div>
      <div class="source-tab ${state.sourceTab === 'imda' ? 'active' : ''}" data-src="imda">PSG gitbook (${cap.imda_raw.length})</div>
    </div>
    <div id="sourceContent"></div>
  `;
  host.querySelectorAll(".source-tab").forEach((t) => {
    t.onclick = () => {
      state.sourceTab = t.dataset.src;
      host.querySelectorAll(".source-tab").forEach((other) => other.classList.toggle("active", other.dataset.src === state.sourceTab));
      renderSourceContent();
    };
  });
  renderSourceContent();
}

function renderSourceContent() {
  const cap = getCap();
  const host = document.getElementById("sourceContent");
  if (!host) return;
  if (state.sourceTab === "unified") {
    host.innerHTML = `
      <div class="filters">
        <label class="lbl">Tier</label>
        <div class="pill-group" id="critPills">
          <div class="pill ${state.critFilter === 'all' ? 'active' : ''}" data-v="all">All</div>
          <div class="pill ${state.critFilter === 'must_have' ? 'active' : ''}" data-v="must_have">Required</div>
          <div class="pill ${state.critFilter === 'standard' ? 'active' : ''}" data-v="standard">Preferred</div>
          <div class="pill ${state.critFilter === 'advanced' ? 'active' : ''}" data-v="advanced">Advanced</div>
        </div>
        <label class="lbl" style="margin-left:12px;">Source</label>
        <div class="pill-group" id="srcPills">
          <div class="pill ${state.sourceFilter === 'all' ? 'active' : ''}" data-v="all">All</div>
          <div class="pill ${state.sourceFilter === 'both' ? 'active' : ''}" data-v="both">Both</div>
          <div class="pill ${state.sourceFilter === 'proxy' ? 'active' : ''}" data-v="proxy">Mainstream ERP</div>
          <div class="pill ${state.sourceFilter === 'imda' ? 'active' : ''}" data-v="imda">PSG gitbook</div>
        </div>
      </div>
      <div class="result-count" id="resultCount"></div>
      <ul class="req-list" id="reqList"></ul>
    `;
    host.querySelectorAll("#critPills .pill").forEach((p) => p.onclick = () => { state.critFilter = p.dataset.v; renderSourceContent(); });
    host.querySelectorAll("#srcPills .pill").forEach((p) => p.onclick = () => { state.sourceFilter = p.dataset.v; renderSourceContent(); });
    renderGranularList();
    return;
  }
  if (state.sourceTab === "proxy") {
    if (cap.proxy_raw.length === 0) { host.innerHTML = `<div class="empty">No mainstream ERP catalogue items for this capability.</div>`; return; }
    host.innerHTML = `<div class="result-count">${cap.proxy_raw.length} catalogue items</div>` +
      cap.proxy_raw.map((r) => `<div class="raw-proxy-item">${escapeHtml(r)}</div>`).join("");
    return;
  }
  if (state.sourceTab === "imda") {
    if (cap.imda_raw.length === 0) { host.innerHTML = `<div class="empty">No PSG gitbook items placed here in Step 1.</div>`; return; }
    host.innerHTML = `
      <div class="raw-imda-note">Showing Step 1 placements (PSG items grouped into this capability by the section-lookup pass). These may have been re-sorted in Step 2's merge — switch to the Unified tab to see the final canonical form.</div>

      cap.imda_raw.map((r) => `

}

  document.getElementById("resultCount").textContent = `${reqs.length} of ${cap.unified.length} requirements`;
  const list = document.getElementById("reqList");
  if (reqs.length === 0) { list.innerHTML = `<div class="empty">No requirements match the current filters.</div>`; return; }
  list.innerHTML = reqs.map((r, i) => {
    const vendors = r.vendor_citations && r.vendor_citations.length > 0
      ? `<div class="section"><div class="section-label">Mainstream ERP sources</div><ul>${r.vendor_citations.map(v => `<li><code>${escapeHtml(v)}</code></li>`).join("")}</ul></div>`
      : "";
    const solcats = r.solcat_citations && r.solcat_citations.length > 0
      ? `<div class="section"><div class="section-label">PSG gitbook sources</div><ul>${r.solcat_citations.map(v => `<li><code>${escapeHtml(shortSolcat(v))}</code></li>`).join("")}</ul></div>`
      : "";
    const proxyRefs = r.proxy_refs && r.proxy_refs.length > 0
      ? `<div class="section"><div class="section-label">Original catalogue wording</div><ul>${r.proxy_refs.map(p => `<li>${escapeHtml(p)}</li>`).join("")}</ul></div>`

    const imdaRefs = r.imda_refs && r.imda_refs.length > 0

      : "";

// -----------------------------------------------------------------------------
// Rough.js hand-drawn diagram renderer with text wrapping
// -----------------------------------------------------------------------------
//
// Each entity has a label + optional attrs list. Text is wrapped to fit inside
// the box's available width at a fixed font size. Labels too long to fit even
// after wrapping are allowed to render — the box just grows in height to
// accommodate. No truncation.
//
// Edge labels are optional — only rendered when the scene explicitly provides
// one. Edges without labels just show as arrows.

function wrapTextToWidth(text, maxChars) {
  // Split text into lines such that no line exceeds maxChars characters,
  // breaking on word boundaries. Returns an array of lines.
  if (!text) return [""];
  const words = String(text).split(/\s+/);
  const lines = [];
  let current = "";
  for (const word of words) {
    if (current.length === 0) {
      current = word;
    } else if (current.length + 1 + word.length <= maxChars) {
      current += " " + word;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current.length > 0) lines.push(current);
  return lines;
}

function renderRoughDiagram(scene, host) {
  const svgNS = "http://www.w3.org/2000/svg";
  // The actual drawing height might grow beyond scene.height if text wraps;
  // compute it after laying out entities below.
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("xmlns", svgNS);
  host.appendChild(svg);

  const rc = rough.svg(svg);
  const fontFamily = "Caveat, Comic Sans MS, Marker Felt, cursive";
  const avgCharWidth = 9;  // approx at our font sizes for the cursive font
  const labelFontSize = 18;
  const attrFontSize = 14;
  const labelLineHeight = 22;
  const attrLineHeight = 18;
  const boxPadX = 14;
  const boxPadY = 12;

  // Layout pass — for each entity, ensure the box is wide enough for at
  // least the longest single word in the label or attrs (so we never wrap
  // "Invoice" vertically character-by-character). Then wrap text to the
  // (possibly widened) box, and grow height as needed.
  scene.entities.forEach((e) => {
    // Find the longest word across label + attrs
    const allStrings = [e.label || ""].concat(e.attrs || []);
    let longestWord = 0;
    allStrings.forEach((s) => {
      String(s).split(/\s+/).forEach((w) => {
        if (w.length > longestWord) longestWord = w.length;
      });
    });
    const minRequiredW = longestWord * avgCharWidth + 2 * boxPadX + 8;
    if (e.w < minRequiredW) {
      e.w = minRequiredW;
    }

    const maxCharsLabel = Math.max(6, Math.floor((e.w - 2 * boxPadX) / (avgCharWidth + 1)));
    const maxCharsAttr = Math.max(6, Math.floor((e.w - 2 * boxPadX) / avgCharWidth));
    e._labelLines = wrapTextToWidth(e.label, maxCharsLabel);
    e._attrLines = [];
    if (e.attrs && e.attrs.length > 0) {
      e.attrs.forEach((attr) => {
        const lines = wrapTextToWidth(attr, maxCharsAttr);
        e._attrLines.push(...lines);
      });
    }
    // Compute minimum required height
    const labelH = e._labelLines.length * labelLineHeight;
    const dividerH = e._attrLines.length > 0 ? 8 : 0;
    const attrsH = e._attrLines.length * attrLineHeight;
    const minH = boxPadY * 2 + labelH + dividerH + attrsH;
    if (minH > e.h) e.h = minH;
  });

  // Determine actual canvas size based on laid-out entities
  let maxX = 0;
  let maxY = 0;
  scene.entities.forEach((e) => {
    if (e.x + e.w > maxX) maxX = e.x + e.w;
    if (e.y + e.h > maxY) maxY = e.y + e.h;
  });
  const canvasW = Math.max(scene.width, maxX + 20);
  const canvasH = Math.max(scene.height, maxY + 20);
  svg.setAttribute("width", canvasW);
  svg.setAttribute("height", canvasH);
  svg.setAttribute("viewBox", `0 0 ${canvasW} ${canvasH}`);

  // Build lookup for edges
  const entMap = {};
  scene.entities.forEach((e) => { entMap[e.id] = e; });

  // Edges (drawn first, under entities)
  scene.edges.forEach((edge) => {
    const from = entMap[edge.from];
    const to = entMap[edge.to];
    if (!from || !to) return;
    const fcx = from.x + from.w / 2;
    const fcy = from.y + from.h / 2;
    const tcx = to.x + to.w / 2;
    const tcy = to.y + to.h / 2;
    const [sx, sy] = clipToRect(fcx, fcy, tcx, tcy, from);
    const [ex, ey] = clipToRect(tcx, tcy, fcx, fcy, to);

    const opts = { stroke: "#6b7380", strokeWidth: 1.6, roughness: 1.1, bowing: 1.8 };
    if (edge.style === "dashed") opts.strokeLineDash = [6, 4];
    svg.appendChild(rc.line(sx, sy, ex, ey, opts));

    // Arrowhead
    const arrowSize = 9;
    const angle = Math.atan2(ey - sy, ex - sx);
    const ax1 = ex - arrowSize * Math.cos(angle - Math.PI / 6);
    const ay1 = ey - arrowSize * Math.sin(angle - Math.PI / 6);
    const ax2 = ex - arrowSize * Math.cos(angle + Math.PI / 6);
    const ay2 = ey - arrowSize * Math.sin(angle + Math.PI / 6);
    svg.appendChild(rc.line(ex, ey, ax1, ay1, { stroke: "#6b7380", strokeWidth: 1.6, roughness: 0.5 }));
    svg.appendChild(rc.line(ex, ey, ax2, ay2, { stroke: "#6b7380", strokeWidth: 1.6, roughness: 0.5 }));

    // Edge label (only if provided)
    if (edge.label) {
      const mx = (sx + ex) / 2;
      const my = (sy + ey) / 2 - 4;
      const labelWidth = edge.label.length * 8 + 12;
      const bgRect = document.createElementNS(svgNS, "rect");
      bgRect.setAttribute("x", mx - labelWidth / 2);
      bgRect.setAttribute("y", my - 13);
      bgRect.setAttribute("width", labelWidth);
      bgRect.setAttribute("height", 18);
      bgRect.setAttribute("fill", "#fafbfd");
      bgRect.setAttribute("fill-opacity", "0.92");
      bgRect.setAttribute("rx", "3");
      bgRect.setAttribute("stroke", "#e2e5ea");
      bgRect.setAttribute("stroke-width", "0.5");
      svg.appendChild(bgRect);

      const labelText = document.createElementNS(svgNS, "text");
      labelText.setAttribute("x", mx);
      labelText.setAttribute("y", my);
      labelText.setAttribute("text-anchor", "middle");
      labelText.setAttribute("font-family", fontFamily);
      labelText.setAttribute("font-size", "15");
      labelText.setAttribute("fill", "#4b5563");
      labelText.textContent = edge.label;
      svg.appendChild(labelText);
    }
  });

  // Entity boxes + wrapped text
  scene.entities.forEach((e) => {
    const colour = scene.colours[e.colour] || { fill: "#ffffff", stroke: "#6b7380" };
    svg.appendChild(rc.rectangle(e.x, e.y, e.w, e.h, {
      fill: colour.fill,
      fillStyle: "solid",
      stroke: colour.stroke,
      strokeWidth: 2,
      roughness: 1.3,
      bowing: 1.3,
    }));

    // Label lines
    const labelStartY = e.y + boxPadY + labelFontSize;
    e._labelLines.forEach((line, i) => {
      const t = document.createElementNS(svgNS, "text");
      t.setAttribute("x", e.x + e.w / 2);
      t.setAttribute("y", labelStartY + i * labelLineHeight);
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("font-family", fontFamily);
      t.setAttribute("font-size", labelFontSize);
      t.setAttribute("font-weight", "bold");
      t.setAttribute("fill", colour.stroke);
      t.textContent = line;
      svg.appendChild(t);
    });

    // Divider + attrs only if attrs present
    if (e._attrLines.length > 0) {
      const dividerY = e.y + boxPadY + e._labelLines.length * labelLineHeight + 6;
      svg.appendChild(rc.line(
        e.x + 12, dividerY, e.x + e.w - 12, dividerY,
        { stroke: colour.stroke, strokeWidth: 1, roughness: 0.8 }
      ));
      const attrStartY = dividerY + attrFontSize + 4;
      e._attrLines.forEach((line, i) => {
        const t = document.createElementNS(svgNS, "text");
        t.setAttribute("x", e.x + e.w / 2);
        t.setAttribute("y", attrStartY + i * attrLineHeight);
        t.setAttribute("text-anchor", "middle");
        t.setAttribute("font-family", fontFamily);
        t.setAttribute("font-size", attrFontSize);
        t.setAttribute("fill", "#374151");
        t.textContent = line;
        svg.appendChild(t);
      });
    }
  });
}

function clipToRect(x1, y1, x2, y2, rect) {
  const cx = rect.x + rect.w / 2;
  const cy = rect.y + rect.h / 2;
  const dx = x2 - cx;
  const dy = y2 - cy;
  if (dx === 0 && dy === 0) return [cx, cy];
  const tx = dx === 0 ? Infinity : (rect.w / 2) / Math.abs(dx);
  const ty = dy === 0 ? Infinity : (rect.h / 2) / Math.abs(dy);
  const t = Math.min(tx, ty);
  return [cx + dx * t, cy + dy * t];
}

function renderCompliance() {
  const main = document.getElementById("main");
  main.classList.add("narrow");
  const body = document.getElementById("mainBody");

  const baseline = DATA.compliance_baseline;
  if (!baseline) {
    body.innerHTML = `
      <div class="page-header">
        <h2>Compliance Baseline</h2>
        <div class="page-subtitle">No compliance baseline loaded — run <code>pipeline/compliance_baseline.py</code> first.</div>
      </div>
    `;
    return;
  }

  const groupsHtml = baseline.groups.map((g) => {
    const itemsHtml = g.checklist.map((item, i) => {
      const sourcesHtml = item.source_refs.map((sr) => `
        <div class="compliance-source">
          <span class="compliance-source-count">${sr.sol_cat_count}×</span>
          <span class="compliance-source-q">${escapeHtml(sr.question_title)}</span>
          <div class="compliance-source-text">${escapeHtml(sr.text.substring(0, 280))}</div>
        </div>
      `).join("");
      return `
        <div class="compliance-item">
          <div class="compliance-item-head">
            <span class="compliance-item-box">☐</span>
            <div class="compliance-item-main">
              <div class="compliance-item-text">${i + 1}. ${escapeHtml(item.text)}</div>
              ${item.rationale ? `<div class="compliance-item-rationale">${escapeHtml(item.rationale)}</div>` : ""}
            </div>
            <div class="compliance-item-toggle">Sources ▸</div>
          </div>
          <div class="compliance-item-sources">
            <div class="compliance-source-label">PSG gitbook sources (${item.source_refs.length}):</div>
            ${sourcesHtml}
          </div>
        </div>
      `;
    }).join("");

    return `
      <div class="compliance-group">
        <div class="compliance-group-header">
          <div class="compliance-group-name">${escapeHtml(g.name)}</div>
          <div class="compliance-group-meta">${g.checklist.length} items · rolled up from ${g.raw_item_count} PSG requirement${g.raw_item_count === 1 ? "" : "s"}</div>
        </div>
        <div class="compliance-group-desc">${escapeHtml(g.description)}</div>
        <div class="compliance-items">${itemsHtml}</div>
      </div>
    `;
  }).join("");

  body.innerHTML = `
    <div class="page-header">
      <h2>Compliance Baseline — PSG Regulatory Floor</h2>
      <div class="page-subtitle">${escapeHtml(baseline.description)}</div>
    </div>

    <div class="compliance-intro">
      <strong>Why this exists:</strong> Every solution pre-approved under the PSG programme
      must meet the same regulatory requirements regardless of which module it covers —
      Cyber Essentials Mark, PDPA compliance, and Vulnerability Assessment / Penetration
      Testing. These ${baseline.stats.total_checklist_items} items are the cross-module floor every
      vendor must clear before answering any module-specific questionnaire.
      <div style="margin-top:8px;font-size:11px;"><strong>Source:</strong> ${escapeHtml(baseline.source)}. Detected from PSG's compliance question block which appears at the end of all 89 solution categories.</div>
    </div>

    ${groupsHtml}
  `;

  // Click to expand source refs
  body.querySelectorAll(".compliance-item-head").forEach((h) => {
    h.onclick = () => h.parentElement.classList.toggle("expanded");
  });
}
