<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex, nofollow">
<title>Canonical Spec — Fleet Management</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --panel: #ffffff;
    --border: #e2e5ea;
    --text: #1a1f2b;
    --muted: #6b7380;
    --accent: #2563eb;
    --required: #16a34a;
    --preferred: #2563eb;
    --advanced: #9333ea;
    --both: #16a34a;
    --proxy: #2563eb;
    --imda: #ea8b00;
    --tier-essential: #16a34a;
    --tier-standard: #2563eb;
    --tier-optional: #6b7380;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .layout { display: grid; grid-template-columns: 320px 1fr; flex: 1; min-height: 0; }
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
  }
  .top-nav {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: #fafbfd;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top-nav h1 {
    margin: 0 0 2px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .top-nav .module-name {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
  }
  .top-nav .nav-buttons {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 12px;
  }
  .top-nav .nav-btn {
    padding: 9px 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: left;
    transition: all 0.1s;
  }
  .top-nav .nav-btn:hover { background: #eef2ff; }
  .top-nav .nav-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }

  .family-section { padding: 4px 0; }
  .family-heading {
    padding: 12px 16px 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    color: var(--muted);
  }
  .capability-list { list-style: none; padding: 0; margin: 0; }
  .capability-list li {
    padding: 9px 16px 9px 20px;
    border-left: 3px solid transparent;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    transition: background 0.1s;
  }
  .capability-list li:hover { background: #f1f4f9; }
  .capability-list li.dimmed { opacity: 0.3; }
  .capability-list li.active {
    background: #eef2ff;
    border-left-color: var(--accent);
  }
  .capability-list .cap-name { flex: 1; font-size: 13px; font-weight: 500; }
  .capability-list li.active .cap-name { font-weight: 600; }
  .capability-list .cap-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  .capability-list .count {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    padding-top: 2px;
    text-align: right;
  }
  .count-sector { display: block; font-size: 9px; color: #9ca3af; }
  .sme-dot { display:inline-block;width:6px;height:6px;background:var(--required);border-radius:50%;margin-right:5px;margin-bottom:1px;vertical-align:middle; }
  .non-sme-dot { display:inline-block;width:6px;height:6px;background:var(--muted);border-radius:50%;margin-right:5px;margin-bottom:1px;vertical-align:middle;opacity:0.4; }

  main {
    overflow-y: auto;
    padding: 28px 36px 80px;
  }
  main.narrow > * { max-width: 960px; margin-left: auto; margin-right: auto; }

  .page-header { margin-bottom: 12px; }
  .page-header h2 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  .page-header .page-subtitle { color: var(--muted); font-size: 12px; line-height: 1.5; }

  /* Overview: Methodology (collapsed by default) */
  .method-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin: 8px 0 10px;
    overflow: hidden;
  }
  .method-header {
    padding: 8px 14px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: #fafbfd;
  }
  .method-header:hover { background: #eef2ff; }
  .method-block.expanded .method-header { border-bottom: 1px solid var(--border); }
  .method-title { font-weight: 600; font-size: 14px; }
  .method-hint { font-size: 11px; color: var(--muted); }
  .method-caret { font-size: 12px; color: var(--muted); }
  .method-body { padding: 16px 22px 18px; display: none; }
  .method-block.expanded .method-body { display: block; }
  .method-section {
    border-left: 3px solid var(--accent);
    padding: 10px 16px;
    margin-bottom: 10px;
    background: #fafbfd;
    border-radius: 0 6px 6px 0;
  }
  .method-section:last-child { margin-bottom: 0; }
  .method-section h4 { margin: 0 0 4px; font-size: 13px; color: var(--accent); font-weight: 600; }
  .method-section p { margin: 0; line-height: 1.6; font-size: 13px; color: var(--text); }
  .method-footer {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
  }
  .method-footer code {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    background: #f3f4f6;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-style: normal;
  }

  /* Overview: Checklist section title */
  .checklist-header {
    margin: 28px 0 12px;
  }
  .checklist-header h3 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 700;
  }
  .checklist-header .checklist-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .global-filter-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin: 14px 0 20px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .global-filter-bar label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .global-filter-bar .pill-group { display: flex; gap: 4px; }
  .global-filter-bar .pill {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    background: var(--bg);
    font-size: 12px;
    font-weight: 500;
  }
  .global-filter-bar .pill:hover { background: #eef2ff; }
  .global-filter-bar .pill.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: 600; }
  .expand-toggle {
    margin-left: auto;
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }

  /* Three-level accordion */
  .family-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .family-acc-header {
    padding: 16px 20px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #fafbfd;
    transition: background 0.1s;
    border-left: 4px solid var(--accent);
  }
  .family-acc-header:hover { background: #eef2ff; }
  .family-acc:not(.collapsed) .family-acc-header { border-bottom: 1px solid var(--border); }
  .family-acc-title { font-size: 16px; font-weight: 700; }
  .family-acc-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .family-tier-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-left: 8px;
  }
  .family-tier-badge.essential { background: #dcfce7; color: #166534; }
  .family-tier-badge.standard { background: #dbeafe; color: #1e40af; }
  .family-tier-badge.optional { background: #e5e7eb; color: #4b5563; }
  .family-acc-counts {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .family-acc-counts .count-chip {
    padding: 3px 8px;
    border-radius: 10px;
    background: var(--bg);
  }
  .family-acc-counts .count-chip.req { background: #dcfce7; color: #166534; font-weight: 600; }
  .family-acc-counts .count-chip.pref { background: #dbeafe; color: #1e40af; font-weight: 600; }
  .family-acc-caret { font-size: 13px; color: var(--muted); width: 14px; text-align: center; }
  .family-acc-body { padding: 16px 22px 20px; }
  .family-acc.collapsed .family-acc-body { display: none; }

  .family-narrative {
    background: #f0f9ff;
    border-left: 3px solid #0ea5e9;
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.65;
    color: #0c4a6e;
    margin-bottom: 18px;
  }

  .cap-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .cap-acc-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    transition: background 0.1s;
  }
  .cap-acc-header:hover { background: #fafbfd; }
  .cap-acc:not(.collapsed) .cap-acc-header { border-bottom: 1px solid var(--border); background: #fafbfd; }
  .cap-acc-title { font-weight: 600; font-size: 14px; }
  .cap-acc-desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .cap-acc-counts { display: flex; gap: 6px; font-size: 11px; flex-shrink: 0; }
  .cap-acc-body { padding: 12px 18px 14px; }
  .cap-acc.collapsed .cap-acc-body { display: none; }

  .cap-excluded-banner {
    background: #fefce8;
    border-left: 3px solid #eab308;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    color: #713f12;
    margin: 0;
    font-style: italic;
  }

  /* Individual SME item accordion */
  .item-acc {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .item-acc-header {
    padding: 10px 14px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
  }
  .item-acc-header:hover { background: #fafbfd; }
  .item-acc:not(.collapsed) .item-acc-header { border-bottom: 1px solid var(--border); background: #fafbfd; }
  .item-tier-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .item-tier-badge.required { background: #dcfce7; color: #166534; }
  .item-tier-badge.preferred { background: #dbeafe; color: #1e40af; }
  .item-text { flex: 1; line-height: 1.55; font-size: 13px; }
  .item-rationale {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
    line-height: 1.5;
  }
  .item-caret {
    font-size: 11px;
    color: var(--muted);
    width: 12px;
    text-align: center;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .item-acc-body { padding: 10px 14px 12px 38px; }
  .item-acc.collapsed .item-acc-body { display: none; }
  .item-sources-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 5px;
  }
  .source-ref {
    padding: 5px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .source-ref:last-child { border-bottom: none; }
  .src-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-right: 6px;
  }
  .src-pill.required { background: #dcfce7; color: #166534; }
  .src-pill.preferred { background: #dbeafe; color: #1e40af; }
  .src-pill.proxy { background: #dbeafe; color: #1e40af; }
  .src-pill.imda { background: #ffedd5; color: #9a3412; }
  .src-pill.both { background: #dcfce7; color: #166534; }

  /* ========== Vendor Questionnaire ========== */
  .questionnaire-section {
    margin-top: 28px;
  }
  .q-section-header {
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .q-section-header h3 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
  }
  .q-section-hint {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .q-family {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .q-family-header {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    background: #fafbfd;
    border-left: 4px solid var(--accent);
    transition: background 0.1s;
  }
  .q-family-header:hover { background: #eef2ff; }
  .q-family:not(.collapsed) .q-family-header { border-bottom: 1px solid var(--border); }
  .q-family-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .q-family-narrative {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.55;
    margin-top: 4px;
  }
  .q-family-count {
    font-size: 11px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    padding: 3px 10px;
    background: var(--bg);
    border-radius: 10px;
    align-self: flex-start;
    margin-top: 3px;
  }
  .q-family-caret {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
    align-self: center;
    width: 14px;
    text-align: center;
  }
  .q-family-body {
    padding: 14px 18px 18px;
  }
  .q-family.collapsed .q-family-body { display: none; }

  .q-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--required);
    border-radius: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .q-card.preferred { border-left-color: var(--preferred); }
  .q-card-header {
    padding: 14px 18px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .q-card-header:hover { background: #fafbfd; }
  .q-card-cap {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .q-card-question {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .q-card-controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .q-card-answer-format {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .q-card-toggle {
    font-size: 11px;
    color: var(--accent);
    margin-left: auto;
    font-weight: 500;
  }
  .q-card.expanded .q-card-toggle::after { content: " ▼"; }
  .q-card:not(.expanded) .q-card-toggle::after { content: ""; }
  .q-card-body {
    display: none;
    padding: 14px 18px 18px;
    border-top: 1px dashed var(--border);
    background: #fafbfd;
  }
  .q-card.expanded .q-card-body { display: block; }
  .q-prompt {
    background: #f0f9ff;
    border-left: 3px solid #0ea5e9;
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 14px;
  }
  .q-prompt-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-weight: 600;
    color: #0c4a6e;
    margin-bottom: 4px;
  }
  .q-prompt-hint {
    font-size: 12px;
    color: #0c4a6e;
    line-height: 1.55;
    font-style: italic;
  }
  .q-covers-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .q-cover-item {
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .q-cover-item:last-child { border-bottom: none; }
  .q-cover-rationale {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 3px;
    line-height: 1.5;
  }
  .src-pill.both { background: #dcfce7; color: #166534; }

  /* ========== Overview mode toggle ========== */
  .overview-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 20px 0 0;
    flex-wrap: wrap;
  }
  .overview-expand-btn {
    padding: 7px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    font-family: inherit;
  }
  .overview-expand-btn:hover {
    background: #eef2ff;
    border-color: var(--accent);
  }
  .overview-toolbar { margin-top: 8px; }
  .overview-mode-rows { display: flex; flex-direction: column; gap: 3px; }
  .overview-mode-tabs {
    display: flex;
    gap: 3px;
    padding: 3px;
    background: #eceff4;
    border-radius: 6px;
    width: fit-content;
  }
  .overview-mode-tabs-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 6px;
    align-self: center;
  }
  .overview-mode-tab {
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.1s;
  }
  .overview-mode-tab:hover { color: var(--text); }
  .overview-mode-tab.active {
    background: var(--panel);
    color: var(--accent);
    font-weight: 600;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  }
  .answer-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 10px;
  }

  /* ========== Compact view ========== */
  .compact-section {
    margin-top: 14px;
  }
  .compact-section-title {
    font-size: 14px;
    font-weight: 700;
    margin: 0 0 2px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--border);
  }
  .compact-section-title.required { color: var(--required); border-bottom-color: var(--required); }
  .compact-section-title.preferred { color: var(--preferred); border-bottom-color: var(--preferred); }
  .compact-section-sub {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    font-style: italic;
  }
  .compact-family-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    font-weight: 600;
    margin: 14px 0 6px;
    padding-left: 4px;
  }
  .compact-q {
    margin-bottom: 4px;
    border-left: 3px solid var(--border);
    background: var(--panel);
    border-radius: 0 4px 4px 0;
    transition: background 0.1s;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid var(--border);
    border-left-width: 3px;
    overflow: hidden;
  }
  .compact-q.required { border-left-color: var(--required); }
  .compact-q.preferred { border-left-color: var(--preferred); }
  .compact-q-head {
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: background 0.1s;
  }
  .compact-q-head:hover { background: #fafbfd; }

rotation date"], "colour": "catalogue"}, {"id": "INC", "x": 560, "y": 490, "w": 220, "h": 140, "label": "Incident", "attrs": ["date and location", "driver and damage", "claim reference"], "colour": "transactional"}, {"id": "COST", "x": 840, "y": 490, "w": 220, "h": 140, "label": "Cost Entry", "attrs": ["category (fuel / repair / tax)", "amount and date", "vehicle reference"], "colour": "transactional"}], "edges": [{"from": "VEH", "to": "DRV", "label": "assigned to", "style": "solid"}, {"from": "VEH", "to": "TRIP", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "FLOG", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "MWO", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "INSP", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "INS", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "TYRE", "label": "one to many", "style": "solid"}, {"from": "VEH", "to": "INC", "label": "one to many", "style": "solid"}, {"from": "DRV", "to": "TRIP", "label": "drives", "style": "dashed"}, {"from": "DRV", "to": "INC", "label": "involved in", "style": "dashed"}, {"from": "MWO", "to": "VEND", "label": "assigned to", "style": "solid"}, {"from": "MWO", "to": "TYRE", "label": "replaces", "style": "dashed"}, {"from": "INC", "to": "INS", "label": "triggers claim", "style": "dashed"}, {"from": "FLOG", "to": "COST", "label": "generates", "style": "solid"}, {"from": "MWO", "to": "COST", "label": "generates", "style": "solid"}, {"from": "INS", "to": "COST", "label": "generates", "style": "dashed"}], "colours": {"core": {"fill": "#dbeafe", "stroke": "#2563eb"}, "transactional": {"fill": "#dcfce7", "stroke": "#16a34a"}, "catalogue": {"fill": "#f3e8ff", "stroke": "#9333ea"}}}, "edge_legend": [{"style": "solid", "meaning": "Required relationship \u2014 this link always exists"}, {"style": "dashed", "meaning": "Optional or indirect link \u2014 these records may or may not be connected"}, {"style": "label:one to many", "meaning": "One record on the left can have many records on the right (e.g. one Vehicle has many Trips)"}], "box_legend": [{"colour": "core", "label": "Master records \u2014 vehicles and drivers"}, {"colour": "transactional", "label": "Transactional records \u2014 trips, fuel logs, work orders, inspections, incidents, costs"}, {"colour": "catalogue", "label": "Reference data \u2014 workshops, insurance policies, tyres"}]}, "layer": {"title": "Capability Layer Stack \u2014 what sits on top of what", "description": "Fleet Management capabilities stack in three layers. The bottom layer is the data foundation \u2014 vehicle and driver records, access control, and integrations. The middle layer is day-to-day operations \u2014 trips, fuel, maintenance, and GPS. The top layer is analytics, compliance, and strategic decisions.", "type": "rough", "content": {"width": 1180, "height": 540, "entities": [{"id": "L3_TITLE", "x": 60, "y": 40, "w": 1060, "h": 36, "label": "Layer 3 \u2014 Analytics, Compliance and Strategy (the fleet command centre)", "colour": "analytics_title"}, {"id": "L3_COST", "x": 80, "y": 96, "w": 200, "h": 72, "label": "TCO analysis", "colour": "analytics"}, {"id": "L3_COMPLY", "x": 300, "y": 96, "w": 200, "h": 72, "label": "Compliance and regulatory", "colour": "analytics"}, {"id": "L3_EMIS", "x": 520, "y": 96, "w": 200, "h": 72, "label": "Emissions and ESG", "colour": "analytics"}, {"id": "L3_DASH", "x": 740, "y": 96, "w": 200, "h": 72, "label": "Dashboards and reports", "colour": "analytics"}, {"id": "L3_AI", "x": 960, "y": 96, "w": 160, "h": 72, "label": "Fleet AI and analytics", "colour": "analytics"}, {"id": "L2_TITLE", "x": 60, "y": 200, "w": 1060, "h": 36, "label": "Layer 2 \u2014 Day-to-Day Operations (where the fleet runs)", "colour": "ops_title"}, {"id": "L2_TRIP", "x": 80, "y": 256, "w": 160, "h": 80, "label": "Trips and mileage", "colour": "ops"}, {"id": "L2_FUEL", "x": 260, "y": 256, "w": 160, "h": 80, "label": "Fuel logging", "colour": "ops"}, { s, fuel, maintenance, GPS, routing, booking)"}, {"colour": "analytics", "label": "Layer 3 \u2014 analytics, compliance, and strategy (TCO, regulatory, emissions, dashboards, AI)"}]}, "lifecycle": {"title": "Vehicle Lifecycle \u2014 which capability adds value at which stage", "description": "Every fleet vehicle passes through six phases, from acquisition to disposal. Each capability pays off at one or more phases. An SME can invest incrementally \u2014 start with Acquire and Register, then add Operate and Maintain, then Monitor and Dispose as the fleet grows.", "type": "rough", "content": {"width": 1280, "height": 580, "entities": [{"id": "P1", "x": 40, "y": 60, "w": 190, "h": 52, "label": "1. Acquire", "colour": "phase"}, {"id": "P2", "x": 250, "y": 60, "w": 190, "h": 52, "label": "2. Register", "colour": "phase"}, {"id": "P3", "x": 460, "y": 60, "w": 190, "h": 52, "label": "3. Operate", "colour": "phase"}, {"id": "P4", "x": 670, "y": 60, "w": 190, "h": 52, "label": "4. Maintain", "colour": "phase"}, {"id": "P5", "x": 880, "y": 60, "w": 190, "h": 52, "label": "5. Monitor", "colour": "phase"}, {"id": "P6", "x": 1080, "y": 60, "w": 190, "h": 52, "label": "6. Dispose", "colour": "phase"}, {"id": "A1", "x": 40, "y": 150, "w": 190, "h": 60, "label": "Procurement request", "colour": "cap"}, {"id": "A2", "x": 40, "y": 226, "w": 190, "h": 60, "label": "Purchase or lease", "colour": "cap"}, {"id": "A3", "x": 40, "y": 302, "w": 190, "h": 60, "label": "Budget approval", "colour": "cap"}, {"id": "B1", "x": 250, "y": 150, "w": 190, "h": 60, "label": "Vehicle master record", "colour": "cap"}, {"id": "B2", "x": 250, "y": 226, "w": 190, "h": 60, "label": "Insurance policy", "colour": "cap"}, {"id": "B3", "x": 250, "y": 302, "w": 190, "h": 60, "label": "Road tax and COE", "colour": "cap"}, {"id": "B4", "x": 250, "y": 378, "w": 190, "h": 60, "label": "Driver assignment", "colour": "cap"}, {"id": "C1", "x": 460, "y": 150, "w": 190, "h": 60, "label": "Trip and mileage logs", "colour": "cap"}, {"id": "C2", "x": 460, "y": 226, "w": 190, "h": 60, "label": "Fuel recording", "colour": "cap"}, {"id": "C3", "x": 460, "y": 302, "w": 190, "h": 60, "label": "GPS tracking", "colour": "cap"}, {"id": "C4", "x": 460, "y": 378, "w": 190, "h": 60, "label": "Route planning", "colour": "cap"}, {"id": "D1", "x": 670, "y": 150, "w": 190, "h": 60, "label": "Preventive scheduling", "colour": "cap"}, {"id": "D2", "x": 670, "y": 226, "w": 190, "h": 60, "label": "Work orders", "colour": "cap"}, {"id": "D3", "x": 670, "y": 302, "w": 190, "h": 60, "label": "Tyre rotation", "colour": "cap"}, {"id": "D4", "x": 670, "y": 378, "w": 190, "h": 60, "label": "Inspections", "colour": "cap"}, {"id": "E1", "x": 880, "y": 150, "w": 190, "h": 60, "label": "TCO analysis", "colour": "cap"}, {"id": "E2", "x": 880, "y": 226, "w": 190, "h": 60, "label": "Driver safety scoring", "colour": "cap"}, {"id": "E3", "x": 880, "y": 302, "w": 190, "h": 60, "label": "Compliance tracking", "colour": "cap"}, {"id": "E4", "x": 880, "y": 378, "w": 190, "h": 60, "label": "Fleet dashboards", "colour": "cap"}, {"id": "F1", "x": 1080, "y": 150, "w": 190, "h": 60, "label": "Replacement planning", "colour": "cap"}, {"id": "F2", "x": 1080, "y": 226, "w": 190, "h": 60, "label": "Auction or trade-in", "colour": "cap"}, {"id": "F3", "x": 1080, "y": 302, "w": 190, "h": 60, "label": "Asset write-off", "colour": "cap"}], "edges": [{"from": "P1", "to": "P2", "style": "solid"}, {"from": "P2", "to": "P3", "style": "solid"}, {"from": "P3", "to": "P4", "style": "solid"}, {"from": "P4", "to": "P5", "style": "solid"}, {"from": "P5", "to": "P6", "style": "solid"}], "colours": {"phase": {"fill": "#dbeafe", "stroke": "#2563eb"}, "cap": {"fill": "#ffffff", "stroke": "#6b7380"}}}, "edge_legend": [{"style": "solid", "meaning": "Time flows left to right through the six phases of a vehicle's life in the fleet"}], "box_legend": [{"colour": "phase", "label": "Phase of the vehicle lifecycle"}, {"colour": "cap", "label": "Capability that delivers value in that phase"}]}}, "methodology_short": [{"heading": "Where the requirements come from", "body": "We combined two sources: the Productivity Solutions Grant (PSG) Pre-Approval Guide (Singapore's regulator-backed list of SME digital solution requirements, published on GitBook) and proxy research from mainstream fleet management systems. Every requirement in this viewer points back to at least one of these sources."}, {"heading": "How we used the PSG gitbook", "body": "We scraped all 89 PSG solution categories across 14 verticals, parsed each page preserving the original section headings, deduplicated across categories, and stripped generic compliance boilerplate (Cyber Essentials Mark, PDPA, security audit language). PSG has no fleet-specific category, so fleet requirements surface indirectly from logistics, transport, and field-service sol cats."}, {"heading": "How we used internet research as proxy", "body": "We drafted a reference catalogue of 25 capabilities a mature Fleet Management module should cover, sourced from public documentation of Odoo Fleet, Fleetio, Samsara, Verizon Connect, Chevin FleetWave, SAP Vehicle Management, Oracle Transportation Management, and the Wikipedia Fleet Management article. Each capability was hand-tagged with a priority (Required / Preferred / Enterprise-only) and an audience (SME / Mid-market / Enterprise)."}, {"heading": "How we combined the two", "body": "A five-step automated pipeline merges the PSG requirements into the proxy catalogue. Step 1 groups each PSG item into the right capability. Step 2 merges proxy and PSG requirements per capability into a unified list. Step 3 clusters them into features. Step 4 re-ranks each one in context. Step 5 rolls up the must-have and preferred items into the stakeholder checklist you see below."}, {"heading": "What you can trust", "body": "Every item in the checklist below is traceable. Click any requirement to see the original proxy wording and the original PSG gitbook text it was derived from. The full technical write-up \u2014 pipeline stages, LLM prompts, cost accounting, decision rationale \u2014 lives in docs/methodology.md in the project repository."}], "family_narratives": {"Platform & Data": {"narrative": "This family ensures your fleet system is accessible to drivers and managers anywhere, protects sensitive data under Singapore's PDPA rules, and connects seamlessly with your accounting and HR systems. SMEs need this foundation to keep operations running smoothly across devices and to comply with data protection regulations. For example, a delivery manager can check vehicle status on their phone while a driver logs trip details on a tablet, and all data syncs securely to your accounting system.", "sme_tier": "essential"}, "Vehicle Registry": {"narrative": "This family maintains a single source of truth for every vehicle in your fleet\u2014from registration details to insurance policies and claims history. SMEs benefit by having all vehicle information in one place, reducing paperwork and ensuring nothing falls through the cracks when managing insurance or handling accidents. For instance, when a vehicle is involved in an incident, you can instantly pull its insurance details and claims history to file a claim quickly.", "sme_tier": "essential"}, "Driver & Safety": {"narrative": "This family tracks driver qualifications, monitors unsafe driving habits like speeding or harsh braking, and records accidents to reduce risk and insurance costs. SMEs should care because safer drivers mean fewer claims, lower premiums, and better compliance with employment and road safety rules. For example, if a driver consistently scores poorly on safety metrics, you can flag them for retraining before an accident happens.", "sme_tier": "essential"}, "Maintenance & Workshop": {"narrative": "This family automates service reminders based on time or mileage and tracks all repairs and maintenance work orders in one place. SMEs benefit by preventing costly breakdowns, extending vehicle life, and keeping maintenance costs predictable. For example, the system reminds you when a vehicle is due for its 40,000 km service, and you can assign the work order to your preferred workshop and track progress in real time.", "sme_tier": "essential"}, "Operations & Logistics": {"narrative": "This family tracks fuel consumption, vehicle location via GPS, trip details, and allows staff to book shared vehicles\u2014giving you visibility into how your fleet is being used and where money is being spent. SMEs need this to spot inefficiencies, reduce fuel waste, and ensure vehicles are available when needed. For example, you can see that one vehicle is consuming more fuel than similar ones, or that a shared pool vehicle is booked 80% of the time, justifying the investment.", "sme_tier": "essential"}, "Cost & Compliance": {"narrative": "This family calculates total cost of ownership per vehicle, generates reports on fleet performance, and tracks Singapore-specific compliance obligations like road tax, COE, and vehicle inspections. SMEs should care because understanding true fleet costs helps with budgeting and pricing, while staying on top of compliance avoids fines and vehicle downtime. For example, a dashboard shows you that Vehicle A costs 15% more per kilometre than Vehicle B, prompting a review of its maintenance or replacement.", "sme_tier": "essential"}, "Tyre Management": {"narrative": "This family monitors tyre condition, schedules rotations, and tracks replacements to maximise tyre life and safety. While useful for larger fleets, SMEs with smaller fleets may manage this manually or through their workshop vendor.", "sme_tier": "optional"}, "Vendor & Workshop Management": {"narrative": "This family maintains a register of external service providers, tracks their quality and turnaround times, and manages costs. SMEs with established relationships with one or two trusted workshops may not need formal vendor management in the system.", "sme_tier": "optional"}, "Route Planning & Optimisation": {"narrative": "This family plans multi-stop delivery routes and optimises them for distance, time, or fuel cost. SMEs with simple, repetitive routes or small delivery areas may not need advanced route optimisation.", "sme_tier": "optional"}, "Pool Vehicle & Car Sharing": {"narrative": "This family manages self-service booking, keyless access, and usage-based billing for shared vehicle pools. SMEs with a small pool or informal sharing arrangements may not need a dedicated system for this.", "sme_tier": "optional"}, "Environmental & Emissions Tracking": {"narrative": "This family monitors fleet carbon emissions and tracks progress toward sustainability goals. SMEs focused on cost control may defer this unless they face customer or regulatory pressure to report emissions.", "sme_tier": "optional"}, "Fleet Analytics & AI": {"narrative": "This family applies machine learning to predict maintenance needs and optimise replacement decisions. SMEs with stable, smaller fleets may not generate enough data to benefit from advanced analytics.", "sme_tier": "optional"}, "Fleet Procurement & Disposal": {"narrative": "This family manages vehicle acquisition, lease versus buy decisions, and replacement planning based on total cost of ownership. SMEs that buy or lease vehicles infrequently may handle this outside the system.", "sme_tier": "optional"}}, "stats": {"haiku_calls": 25, "total_merged_reqs": 180, "feature_haiku_calls": 25, "rank_haiku_calls": 25, "sme_minimum_haiku_calls": 18, "total_sme_minimum_reqs": 103, "module_rollup_haiku_calls": 2, "total_granular_validated": 180, "missing_feature_id": 0, "vendor_q_haiku_calls": 18, "vendor_required_qs": 12, "vendor_preferred_qs": 6}, "compliance_baseline": {"source": "PSG Pre-Approval Guide (Productivity Solutions Grant)", "description": "Singapore's PSG pre-approval requires every vendor to meet a baseline of regulatory and cybersecurity requirements regardless of which ERP module they cover. These apply uniformly across all 89 PSG solution categories.", "groups": [{"id": "cem", "name": "Cyber Essentials Mark (CEM)", "short": "CEM", "description": "Singapore's CSA Cyber Essentials Mark is a baseline cybersecurity certification. PSG-approved vendors must attain CEM for ICT Vendors (if they are the Product Principal) or hold an equivalent accepted certification (if they are a reseller). This is the cornerstone of PSG's compliance floor.", "raw_item_count": 2, "total_sol_cat_occurrences": 88, "checklist": [{"text": "Do you hold Cyber Essentials Mark certification as the Product Principal?", "rationale": "Confirms vendor meets PSG's baseline cybersecurity requirement for solution originators.", "source_refs": [{"text": "Are you the Product Principal of the solution that you are submitting for pre-approval", "question_title": "Cybersecurity Compliance - Cyber Essentials Mark (CEM)", "sol_cat_count": 87}, {"text": "\ud83d\udfe1 Preferred - CEM for Product Principal", "question_title": "Cybersecurity Compliance - Cyber Essentials Mark (CEM)", "sol_cat_count": 1}]}, {"text": "If not Product Principal, do you hold an accepted equivalent certification?", "rationale": "Allows resellers to demonstrate compliance via alternative recognized cybersecurity standards.", "source_refs": [{"text": "Are you the Product Principal of the solution that you are submitting for pre-approval", "question_title": "Cybersecurity Compliance - Cyber Essentials Mark (CEM)", "sol_cat_count": 87}, {"text": "\ud83d\udfe1 Preferred - CEM for Product Principal", "question_title": "Cybersecurity Compliance - Cyber Essentials Mark (CEM)", "sol_cat_count": 1}]}, {"text": "Can you provide current CEM certificate or equivalent certification documentation?", "rationale": "Enables PSG to verify compliance status before pre-approval is granted.", "source_refs": [{"text": "\ud83d\udfe1 Preferred - CEM for Product Principal", "question_title": "Cybersecurity Compliance - Cybe   capId: null,

  sectorFilter: "__generic__", // null = All, "__generic__" = Generic only (default), or PSG sector name
  ucTierFilter: "standard", // baseline | standard | advanced | enterprise | all (cumulative: baseline ⊂ standard ⊂ advanced)
  hideDimmed: false, // if true: hide dimmed UCs + dimmed specs entirely instead of showing grayed
};

// Helper — new 4-boolean schema on validation.reconciled.
// Cumulative: in_baseline ⟹ in_standard ⟹ in_advanced; enterprise_only excludes all three.
function ucMatchesTierFilter(uc, filter) {
  const rec = uc && uc.validation && uc.validation.reconciled;
  if (!rec) return true; // untagged: always show
  if (filter === "all") return true;
  if (filter === "baseline") return rec.in_baseline === true;
  if (filter === "standard") return rec.in_standard === true;
  if (filter === "advanced") return rec.in_advanced === true;
  if (filter === "enterprise") return rec.enterprise_only === true;
  // Legacy filter names — map to closest new tier
  if (filter === "sme_core") return rec.in_baseline === true;
  if (filter === "sme_standard") return rec.in_standard === true && rec.in_baseline !== true;
  if (filter === "sme_min") return rec.in_standard === true;
  return true;
}

// PSG sector config (injected from config/psg_sectors.yaml via build script)
const PSG_SECTOR_MAP = DATA.psg_sector_to_verticals || {};

// Check if a requirement matches the active PSG sector filter.
// Uses psg_sectors from pipeline step 7 (data-driven, not display-time mapping).
// Generic reqs (is_generic: true) appear in ALL sector views as the base layer.
function reqMatchesSector(r, sectorName) {
  if (!sectorName) return true;
  const sc = r.sector_coverage;
  if (sectorName === "__generic__") {
    return sc && sc.is_generic;
  }
  // Always include generic reqs in any sector view
  if (sc && sc.is_generic) return true;
  // Check psg_sectors from pipeline data
  if (sc && sc.psg_sectors && sc.psg_sectors.includes(sectorName)) return true;
  return false;
}

// Check if a capability has any matching reqs for the active sector filter
function capMatchesSector(c, sectorName) {
  if (!sectorName) return true;
  // Prefer step 7b content-based sector_relevance (per capability)
  const sr = c.sector_relevance;
  if (sr) {
    if (sectorName === "__generic__") return sr.generic === true;
    if (sr.generic) return true; // generic = all sectors
    const sd = sr.sectors && sr.sectors[sectorName];
    if (sd) return sd.relevant === true;
  }
  // Fall back to req-level trace (step 7) for caps without 7b data
  return (c.unified || []).some(r => reqMatchesSector(r, sectorName));
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function shortSolcat(sc) { const parts = sc.split("__"); return parts[parts.length - 1]; }

      renderAll();
    };
  });
}

function renderSidebar() {
  const body = document.getElementById("sidebarBody");
  if (state.topView === "overview") {
    // Filter-reactive totals for sidebar Summary
    const mode = state.overviewMode || "";
    const inUcMode = mode.startsWith("uc_");
    const sectorMatch = (c) => !state.sectorFilter || capMatchesSector(c, state.sectorFilter);
    const ucTierMatch = (uc) => inUcMode ? ucMatchesTierFilter(uc, state.ucTierFilter) : true;
    const filteredCaps = DATA.capabilities.filter(c => (c.unified||[]).length > 0 && sectorMatch(c));
    const totalCapsFiltered = filteredCaps.length;
    let specsFiltered = 0, ucsFiltered = 0, smeMinFiltered = 0;
    filteredCaps.forEach(c => {
      specsFiltered += (c.unified || []).length;
      ucsFiltered += (c.generic_use_cases || []).filter(ucTierMatch).length;
      smeMinFiltered += (c.sme_minimum || []).length;
    });

    body.innerHTML = `
      <div class="family-section">
        <div class="family-heading">Jump to family</div>
        <ul class="capability-list" id="overviewJumpList"></ul>
      </div>
      <div class="family-section">
        <div class="family-heading">Summary (after filters)</div>
        <ul class="capability-list">
          <li><div style="flex:1;"><div class="cap-name">${totalCapsFiltered} / ${DATA.capabilities.length} capabilities</div><div class="cap-meta">L2 in current view</div></div></li>
          <li><div style="flex:1;"><div class="cap-name">${ucsFiltered} use cases</div><div class="cap-meta">L3 matching filters</div></div></li>
          <li><div style="flex:1;"><div class="cap-name">${specsFiltered} specs</div><div class="cap-meta">L5 in filtered caps</div></div></li>
          <li><div style="flex:1;"><div class="cap-name">${smeMinFiltered} SME minimum items</div><div class="cap-meta">rolled-up vendor checklist</div></div></li>
        </ul>
      </div>
    `;
    // Family jump list — reactive to sector filter
    const jumpList = document.getElementById("overviewJumpList");
    const order = DATA.family_order.length > 0 ? DATA.family_order : Object.keys(DATA.family_totals);
    const byFamilyAll = {};
    DATA.capabilities.forEach((c) => { (byFamilyAll[c.family] = byFamilyAll[c.family] || []).push(c); });
    jumpList.innerHTML = order.map((fam) => {
      const famCaps = (byFamilyAll[fam] || []).filter(c => (c.unified||[]).length > 0);
      const matchCaps = famCaps.filter(sectorMatch);
      const label = state.sectorFilter
        ? `${matchCaps.length}/${famCaps.length} match`
        : `${famCaps.length} cap${famCaps.length !== 1 ? 's' : ''}`;
      return `<li data-fam="${escapeHtml(fam)}" ${matchCaps.length === 0 ? 'style="opacity:0.4"' : ''}>
        <div style="flex:1;">
          <div class="cap-name">${escapeHtml(fam)}</div>
          <div class="cap-meta">${label}</div>
        </div>
      </li>`;
    }).join("");
    jumpList.querySelectorAll("li").forEach((li) => {
      li.onclick = () => {
        // Scroll to the family section within the Overview itself
        const safe = li.dataset.fam.replace(/[^a-z0-9]/gi, "_");
        const el = document.getElementById("ov-fam-" + safe);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      };
    });
    return;
  }
  if (state.topView === "domain") {
    body.innerHTML = `
      <div class="family-section">
        <div class="family-heading">Diagrams</div>
        <ul class="capability-list">
          ${Object.entries(DATA.diagrams).map(([k, d]) => `
            <li class="${state.domainSubtab === k ? 'active' : ''}" data-subtab="${k}">
              <div style="flex:1;"><div class="cap-name">${escapeHtml(d.title.split('—')[0].trim())}</div><div class="cap-meta">${escapeHtml((d.title.split('—')[1] || '').trim())}</div></div>
            </li>
          `).join("")}
        </ul>
      </div>
    `;
    body.querySelectorAll("li[data-subtab]").forEach((li) => {
      li.onclick = () => { state.domainSubtab = li.dataset.subtab; renderAll(); };
    });
    return;
  }
  if (state.topView === "compliance") {
    const baseline = DATA.compliance_baseline;
    if (!baseline) {
      body.innerHTML = `<div class="family-section"><div class="family-heading">Compliance</div><ul class="capability-list"><li><div style="flex:1;"><div class="cap-name">Not loaded</div></div></li></ul></div>`;
      return;
    }
    body.innerHTML = `
      <div class="family-section">
        <div class="family-heading">Compliance groups</div>
        <ul class="capability-list">
          ${baseline.groups.map((g) => `
            <li>
              <div style="flex:1;"><div class="cap-name">${escapeHtml(g.short)}</div><div class="cap-meta">${g.checklist.length} items</div></div>
            </li>
          `).join("")}
        </ul>
      </div>
      <div class="family-section">
        <div class="family-heading">Summary</div>
        <ul class="capability-list">
          <li><div style="flex:1;"><div class="cap-name">${baseline.stats.total_checklist_items} items</div><div class="cap-meta">rolled up from ${baseline.stats.raw_items} PSG specs</div></div></li>
        </ul>
      </div>
    `;
    return;
  }

  // Review sidebar — respects active sector filter
  const byFamily = {};
  DATA.capabilities.forEach((c) => { (byFamily[c.family] = byFamily[c.family] || []).push(c); });
  const order = DATA.family_order.length > 0 ? DATA.family_order : Object.keys(byFamily);
  let html = "";
  order.forEach((fam) => {
    const caps = byFamily[fam];
    if (!caps || caps.length === 0) return;

    // Count how many caps in this family match the active sector filter
    const matchingCaps = state.sectorFilter
      ? caps.filter(c => capMatchesSector(c, state.sectorFilter))
      : caps;

    // Detect if we are in a Use Cases mode — sidebar should show UC counts then
    const inUcMode = (state.overviewMode || "").startsWith("uc_");
    const ucTierMatch = (uc) => ucMatchesTierFilter(uc, state.ucTierFilter);

    let capItems = "";
    caps.forEach((c) => {
      const active = c.id === state.capId && !state.specialView ? " active" : "";
      const dot = c.sme_applicable ? '<span class="sme-dot" title="For SMEs"></span>' : '<span class="non-sme-dot" title="Not for SMEs"></span>';
      // Count matching specs for active sector filter (L5)
      const matchingReqs = state.sectorFilter
        ? (c.unified || []).filter(r => reqMatchesSector(r, state.sectorFilter)).length
        : c.unified.length;
      // Count matching use cases (reactive to UC tier filter in UC mode)
      const matchingUcs = inUcMode
        ? (c.generic_use_cases || []).filter(ucTierMatch).length
        : (c.generic_use_cases || []).length;
      // PSG sectors for this capability (from step 7b content-based sector_relevance)
      let psgSectorCount = 0;
      const sr = c.sector_relevance;
      if (sr) {
        if (sr.generic) {
          psgSectorCount = Object.keys(sr.sectors || {}).length || 16;
        } else {
          psgSectorCount = Object.values(sr.sectors || {}).filter(s => s && s.relevant).length;
        }
      }
      const dimClass = state.sectorFilter && !capMatchesSector(c, state.sectorFilter) ? " dimmed" : "";
      // Show the number most relevant to current mode (UCs in UC mode, specs elsewhere)
      const primaryCount = inUcMode ? matchingUcs : matchingReqs;
      const primaryLabel = inUcMode ? "use cases" : "specs";
      const totalCount = inUcMode ? (c.generic_use_cases || []).length : c.unified.length;
      capItems += `<li class="${active.trim()}${dimClass}" data-id="${escapeHtml(c.id)}">
        <div style="flex:1;">
          <div class="cap-name">${dot}${escapeHtml(c.name)}</div>
          <div class="cap-meta">${escapeHtml(c.priority_proxy_label)} · ${escapeHtml(c.applicability_display)}</div>
        </div>
        <div class="count" title="${primaryCount}/${totalCount} ${primaryLabel} after filters · ${psgSectorCount} PSG sectors">${primaryCount}<span class="count-sector">${psgSectorCount}s</span></div>
      </li>`;
    });

    const famDim = matchingCaps.length === 0 ? ' style="opacity:0.35"' : "";
    html += `<div class="family-section"${famDim}><div class="family-heading">${escapeHtml(fam)} <span style="font-size:10px;color:#9ca3af">${matchingCaps.length}/${caps.length}</span></div><ul class="capability-list">${capItems}</ul></div>`;
  });

  if (DATA.unmapped_imda.length > 0 || DATA.dropped_noise.length > 0) {
    html += `<div class="family-section"><div class="family-heading">Review buckets</div><ul class="capability-list">`;
    if (DATA.unmapped_imda.length > 0) {
      const a = state.specialView === "unmapped" ? " active" : "";
      html += `<li class="${a.trim()}" data-special="unmapped"><div style="flex:1;"><div class="cap-name">Unmatched PSG items</div><div class="cap-meta">not placed by Step 1</div></div><div class="count">${DATA.unmapped_imda.length}</div></li>`;
    }
    if (DATA.dropped_noise.length > 0) {
      const a = state.specialView === "noise" ? " active" : "";
      html += `<li class="${a.trim()}" data-special="noise"><div style="flex:1;"><div class="cap-name">Dropped as noise</div><div class="cap-meta">form-residue filter</div></div><div class="count">${DATA.dropped_noise.length}</div></li>`;
    }
    html += `</ul></div>`;
  }

  body.innerHTML = html;
  body.querySelectorAll("li[data-id]").forEach((li) => {
    li.onclick = () => { state.capId = li.dataset.id; state.specialView = null; renderAll(); };
  });
  body.querySelectorAll("li[data-special]").forEach((li) => {
    li.onclick = () => { state.specialView = li.dataset.special; state.capId = null; renderAll(); };
  });
}

function totalGranular() { return DATA.capabilities.reduce((a, c) => a + c.unified.length, 0); }
function totalFeatures() { return DATA.capabilities.reduce((a, c) => a + (c.features || []).length, 0); }
function totalSme() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.length : 0), 0); }
function totalRequired() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.filter(i => i.tier === "required").length : 0), 0); }
function totalPreferred() { return DATA.capabilities.reduce((a, c) => a + (c.sme_minimum ? c.sme_minimum.filter(i => i.tier === "preferred").length : 0), 0); }
function getCap() { return DATA.capabilities.find((c) => c.id === state.capId); }

// OVERVIEW view — Vendor Questionnaire (the baseline deliverable)
// =============================================================================
//
// Structure:
//   - Page header with short description
//   - Collapsed "How this specification was built" block
//   - Required Capabilities section (one yes/no question per capability that
//     has required items, grouped by family visually)
//   - Preferred Capabilities section (same structure, capabilities that have
//     preferred items)
//
// A capability can appear in BOTH sections if it has items at both tiers.
// Each question is expandable to show the detailed items it was derived from
// (the audit trail). Questions have an optional "supporting detail" hint
// shown in fine print when expanded.

function renderOverview() {
  const main = document.getElementById("main");
  main.classList.add("narrow");
  const body = document.getElementById("mainBody");

  const methodHtml = renderMethodologyBlock();
  const mode = state.overviewMode;  // compact_all | compact_required | compact_preferred | detailed

  // Pre-compute UC tier counts across this module (respects current sector filter).
  // New schema: cumulative booleans (in_baseline ⊂ in_standard ⊂ in_advanced; enterprise_only separate).
  let ucBaselineCount = 0, ucStandardCount = 0, ucAdvancedCount = 0, ucEntCount = 0, ucAllCount = 0;
  (DATA.capabilities || []).forEach(c => {
    if ((c.unified || []).length === 0) return;
    if (state.sectorFilter && !capMatchesSector(c, state.sectorFilter)) return;
    (c.generic_use_cases || []).forEach(u => {
      ucAllCount++;
      const rec = u.validation && u.validation.reconciled;
      if (!rec) return;
      if (rec.in_baseline) ucBaselineCount++;
      if (rec.in_standard) ucStandardCount++;
      if (rec.in_advanced) ucAdvancedCount++;
      if (rec.enterprise_only) ucEntCount++;
    });
  });
  // Legacy names kept for other blocks still reading them
  const ucCoreCount = ucBaselineCount;
  const ucStdCount = ucStandardCount;

  let contentHtml = "";
  if (mode === "detailed") {
    const requiredListHtml = renderDetailedList("required");
    const preferredListHtml = renderDetailedList("preferred");
    contentHtml = `
      <div class="questionnaire-section">
        <div class="q-section-header">
          <h3>Required Capabilities</h3>
          <div class="q-section-hint">${DATA.total_required_qs} capabilities — module minimums that every vendor must cover across industries. Click a card to see its audit trail.</div>
        </div>
        ${requiredListHtml}
      </div>

      <div class="questionnaire-section">
        <div class="q-section-header">
          <h3>Preferred Capabilities</h3>
          <div class="q-section-hint">${DATA.total_preferred_qs} capabilities — SME-important capabilities that depend on your business model or industry.</div>
        </div>
        ${preferredListHtml}
      </div>
    `;
  } else if (mode.startsWith("uc_")) {
    // Use Cases mode: family → capability (IMDA-style) → lettered use cases → features/reqs
    const ucTier = mode.replace("uc_", ""); // "required" | "preferred" | "all"
    const showRequired = ucTier === "all" || ucTier === "required";
    const showPreferred = ucTier === "all" || ucTier === "preferred";
    // Filter-reactive counts
    const sectorMatch = (c) => !state.sectorFilter || capMatchesSector(c, state.sectorFilter);
    const reqAll = (DATA.capabilities || []).filter(c => (c.unified||[]).length > 0 && c.sme_tier === "required");
    const prefAll = (DATA.capabilities || []).filter(c => (c.unified||[]).length > 0 && c.sme_tier === "preferred");
    const reqFiltered = reqAll.filter(sectorMatch);
    const prefFiltered = prefAll.filter(sectorMatch);
    const reqLabel = state.sectorFilter ? `${reqFiltered.length}/${reqAll.length}` : `${reqAll.length}`;
    const prefLabel = state.sectorFilter ? `${prefFiltered.length}/${prefAll.length}` : `${prefAll.length}`;
    const parts = [];
    if (showRequired) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title required">Required (${reqLabel})</div>
          <div class="compact-section-sub">Module minimums that every vendor must cover across industries.</div>
          ${renderUseCaseChecklist("required")}
        </div>
      `);
    }
    if (showPreferred) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title preferred">Preferred (${prefLabel})</div>
          <div class="compact-section-sub">SME-important capabilities that depend on your business model or industry.</div>
          ${renderUseCaseChecklist("preferred")}
        </div>
      `);
    }
    contentHtml = parts.join("");
  } else {
    // Compact modes
    const showRequired = mode === "compact_all" || mode === "compact_required";
    const showPreferred = mode === "compact_all" || mode === "compact_preferred";
    // Filter-reactive counts
    const sectorMatch = (c) => !state.sectorFilter || capMatchesSector(c, state.sectorFilter);
    const reqAll = (DATA.capabilities || []).filter(c => (c.unified||[]).length > 0 && c.sme_tier === "required");
    const prefAll = (DATA.capabilities || []).filter(c => (c.unified||[]).length > 0 && c.sme_tier === "preferred");
    const reqFiltered = reqAll.filter(sectorMatch);
    const prefFiltered = prefAll.filter(sectorMatch);
    const reqLabel = state.sectorFilter ? `${reqFiltered.length}/${reqAll.length}` : `${reqAll.length}`;
    const prefLabel = state.sectorFilter ? `${prefFiltered.length}/${prefAll.length}` : `${prefAll.length}`;
    const parts = [];
    if (showRequired) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title required">Required (${reqLabel})</div>
          <div class="compact-section-sub">Module minimums that every vendor must cover across industries.</div>
          ${renderCompactList("required")}
        </div>

    if (showPreferred) {
      parts.push(`
        <div class="compact-section">
          <div class="compact-section-title preferred">Preferred (${prefLabel})</div>
          <div class="compact-section-sub">SME-important capabilities that depend on your business model or industry.</div>
          ${renderCompactList("preferred")}
        </div>

    }
    contentHtml = parts.join("");
  }

  const complianceBannerHtml = DATA.compliance_baseline ? `
    <div class="compliance-note" id="complianceBanner">
      Plus ${DATA.compliance_baseline.stats.total_checklist_items} cross-module compliance requirements (CEM, PDPA, VA/PT) every vendor must meet.
      <span class="compliance-note-link">View compliance →</span>
    </div>
  ` : "";

  body.innerHTML = `
    <div class="page-header">
      <h2>${escapeHtml(DATA.module_name)} — Vendor Self-Assessment Checklist</h2>
      <div class="page-subtitle">${escapeHtml(DATA.module_headline)}</div>
    </div>

    ${methodHtml}

    ${complianceBannerHtml}

    <div class="overview-toolbar">
      <div class="overview-mode-rows">
        <div class="overview-mode-tabs">
          <span class="overview-mode-tabs-label">Compact</span>
          <div class="overview-mode-tab ${mode === 'compact_required' ? 'active' : ''}" data-mode="compact_required">Required</div>
          <div class="overview-mode-tab ${mode === 'compact_preferred' ? 'active' : ''}" data-mode="compact_preferred">Preferred</div>
          <div class="overview-mode-tab ${mode === 'compact_all' ? 'active' : ''}" data-mode="compact_all">All</div>
          <div class="overview-mode-tab ${mode === 'detailed' ? 'active' : ''}" data-mode="detailed">Detailed</div>
        </div>
        <div class="overview-mode-tabs">
          <span class="overview-mode-tabs-label">Use Cases</span>
          <div class="overview-mode-tab ${mode === 'uc_required' ? 'active' : ''}" data-mode="uc_required">Required</div>
          <div class="overview-mode-tab ${mode === 'uc_preferred' ? 'active' : ''}" data-mode="uc_preferred">Preferred</div>
          <div class="overview-mode-tab ${mode === 'uc_all' ? 'active' : ''}" data-mode="uc_all">All</div>
        </div>
      </div>
      ${mode !== 'detailed' ? `
        <button class="overview-expand-btn" id="expandCollapseBtn">Expand all</button>

    </div>
    <div class="sector-filter" id="sectorFilterBar">
      <span style="font-size:11px;color:#4b5563;font-weight:600">Sector:</span>
      <span class="sector-pill ${state.sectorFilter === '__generic__' ? 'active' : ''}" data-sector="__generic__">Generic</span>
      <span class="sector-pill ${!state.sectorFilter ? 'active' : ''}" data-sector="">All</span>
      ${(DATA.psg_sectors || []).map(s => {
        const mapped = (PSG_SECTOR_MAP[s] || []).length > 0;
        const title = mapped
          ? (PSG_SECTOR_MAP[s] || []).join(', ')

        return `<span class="sector-pill ${state.sectorFilter === s ? 'active' : ''}" data-sector="${escapeHtml(s)}" title="${title}">${escapeHtml(s)}</span>`;

    ${mode.startsWith('uc_') ? `
      <div class="tier-filter-wrap" id="ucTierFilterBar">
        <span class="tier-filter-label">UC tier:</span>
        <div class="tier-group sme" title="ERP checklist tiers — cumulative (baseline ⊂ standard ⊂ advanced)">
          <span class="sector-pill sme ${state.ucTierFilter === 'baseline' ? 'active' : ''}" data-uctier="baseline" title="Baseline — table-stakes UCs every ERP must support. Failing = not an ERP.">Baseline <span class="pill-count">${ucBaselineCount}</span></span>
          <span class="sector-pill sme ${state.ucTierFilter === 'standard' ? 'active' : ''}" data-uctier="standard" title="Standard — expected in modern/competitive ERP. Includes all baseline UCs.">Standard <span class="pill-count">${ucStandardCount}</span></span>
          <span class="sector-pill sme ${state.ucTierFilter === 'advanced' ? 'active' : ''}" data-uctier="advanced" title="Advanced — differentiating / mature-ERP features. Includes all standard UCs.">Advanced <span class="pill-count">${ucAdvancedCount}</span></span>
        </div>

          <span class="sector-pill ent ${state.ucTierFilter === 'enterprise' ? 'active' : ''}" data-uctier="enterprise" title="Enterprise-only — multi-entity, ASC 606, AI/ML, 100k+ txns. Out of SME scope.">Enterprise <span class="pill-count">${ucEntCount}</span></span>
        </div>
        <span class="sector-pill ${state.ucTierFilter === 'all' ? 'active' : ''}" data-uctier="all" title="Show everything">All <span class="pill-count">${ucAllCount}</span></span>
        <button id="hideDimmedBtn" class="hide-dimmed-btn ${state.hideDimmed ? 'active' : ''}" title="Toggle: hide grayed-out UCs and specs that don't match current filters">${state.hideDimmed ? 'Show all' : 'Hide dimmed'}</button>
      </div>
